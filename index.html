<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BPM Detector</title>

<style>
body {
  background:#0a0a0f;
  color:#fff;
  font-family:monospace;
  padding:20px;
}

.level-meter-bg {
  width:100%;
  height:10px;
  background:#222;
  position:relative;
  margin-bottom:5px;
}
.level-meter-fill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#47ffe8,#e8ff47,#ff4747);
}
.threshold-line {
  position:absolute;
  top:0;
  width:2px;
  height:100%;
  background:red;
}

canvas { width:100%; height:80px; background:#111; }

.controls { margin-top:15px; }
.controls label { font-size:12px; display:block; margin-top:5px; }

button { margin-top:15px; padding:10px; }

</style>
</head>

<body>

<h2>BPM Detector</h2>

<div class="level-meter-bg">
  <div class="level-meter-fill" id="levelMeter"></div>
  <div class="threshold-line" id="thresholdLine"></div>
</div>

<div id="levelDb">-∞ dB</div>

<canvas id="waveform"></canvas>

<h1 id="bpm">--</h1>

<button onclick="toggleDetection()">START / STOP</button>

<div class="controls">
  <label>Silence <input type="range" id="silenceSlider" min="-100" max="-20" value="-85"></label>
  <label>Seuil <input type="range" id="thresholdSlider" min="0.5" max="3" step="0.1" value="1.1"></label>
  <label>Transient <input type="range" id="transientSlider" min="5" max="80" value="25"></label>
  <label>BPM Min <input type="range" id="bpmMinSlider" min="30" max="120" value="50"></label>
  <label>BPM Max <input type="range" id="bpmMaxSlider" min="120" max="300" value="220"></label>
</div>

<script>

// ==========================
// PARAMÈTRES
// ==========================

let SILENCE_GATE_DB = -85;
let THRESHOLD_MULT = 1.1;
let TRANSIENT_THRESHOLD = 25;
let BPM_MIN = 50;
let BPM_MAX = 220;

const FFT_SIZE = 2048;
const MIN_BEAT_INTERVAL_MS = 250;

// ==========================
// AUDIO
// ==========================

let audioCtx, analyser, stream;
let running = false;

let lastBeatTime = 0;
let beatTimes = [];

let dbHistory = [];
let lastDbUpdate = 0;

// ==========================
// UI
// ==========================

const levelMeter = document.getElementById("levelMeter");
const levelDb = document.getElementById("levelDb");
const thresholdLine = document.getElementById("thresholdLine");
const bpmEl = document.getElementById("bpm");

const canvas = document.getElementById("waveform");
const ctx = canvas.getContext("2d");

// sliders
silenceSlider.oninput = e => SILENCE_GATE_DB = +e.target.value;
thresholdSlider.oninput = e => THRESHOLD_MULT = +e.target.value;
transientSlider.oninput = e => TRANSIENT_THRESHOLD = +e.target.value;
bpmMinSlider.oninput = e => BPM_MIN = +e.target.value;
bpmMaxSlider.oninput = e => BPM_MAX = +e.target.value;

// ==========================
// START / STOP
// ==========================

async function toggleDetection() {
  if (running) {
    stream.getTracks().forEach(t=>t.stop());
    audioCtx.close();
    running = false;
    return;
  }

  audioCtx = new AudioContext();
  stream = await navigator.mediaDevices.getUserMedia({audio:true});
  const source = audioCtx.createMediaStreamSource(stream);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = FFT_SIZE;

  source.connect(analyser);

  running = true;
  loop();
}

// ==========================
// LOOP
// ==========================

function loop() {
  if (!running) return;
  requestAnimationFrame(loop);

  const bufLen = analyser.frequencyBinCount;
  const freqData = new Float32Array(bufLen);
  analyser.getFloatFrequencyData(freqData);

  // RMS
  let rms = 0;
  for (let i=0;i<bufLen;i++) {
    const lin = Math.pow(10, freqData[i]/20);
    rms += lin*lin;
  }

  const rmsDb = 10*Math.log10(rms/bufLen);

  // VU
  let norm = (rmsDb + 90)/70;
  norm = Math.pow(norm,2.5);
  norm = Math.max(0,Math.min(1,norm));
  levelMeter.style.width = (norm*100)+"%";

  // DB moyen
  dbHistory.push(rmsDb);
  if (dbHistory.length>30) dbHistory.shift();

  if (performance.now()-lastDbUpdate>1000){
    const avg = dbHistory.reduce((a,b)=>a+b)/dbHistory.length;
    levelDb.textContent = avg.toFixed(1)+" dB";
    lastDbUpdate = performance.now();
  }

  // waveform + transient
  const timeData = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(timeData);

  drawWave(timeData);

  let peak = 0;
  for (let i=0;i<timeData.length;i++){
    const v = Math.abs(timeData[i]-128);
    if (v>peak) peak=v;
  }

  if (rmsDb < SILENCE_GATE_DB) return;

  // spectral flux simple
  let flux = 0;
  for (let i=1;i<bufLen;i++){
    const diff = freqData[i]-freqData[i-1];
    if (diff>0) flux+=diff;
  }

  const threshold = THRESHOLD_MULT * 10;

  // seuil visuel
  let thrNorm = threshold / 50;
  thrNorm = Math.max(0,Math.min(1,thrNorm));
  thresholdLine.style.left = (thrNorm*100)+"%";

  const now = performance.now();
  const delta = now - lastBeatTime;

  if ((flux>threshold || peak>TRANSIENT_THRESHOLD) && delta>MIN_BEAT_INTERVAL_MS){
    lastBeatTime = now;

    levelMeter.style.background="lime";
    setTimeout(()=>levelMeter.style.background="",80);

    beatTimes.push(now);
    if (beatTimes.length>10) beatTimes.shift();

    if (beatTimes.length>3){
      let intervals=[];
      for(let i=1;i<beatTimes.length;i++){
        intervals.push(beatTimes[i]-beatTimes[i-1]);
      }
      const avg = intervals.reduce((a,b)=>a+b)/intervals.length;
      const bpm = 60000/avg;

      if (bpm>BPM_MIN && bpm<BPM_MAX){
        bpmEl.textContent = Math.round(bpm);
      }
    }
  }
}

// ==========================
// WAVEFORM
// ==========================

function drawWave(data){
  const w = canvas.width = canvas.offsetWidth;
  const h = canvas.height = canvas.offsetHeight;

  ctx.clearRect(0,0,w,h);
  ctx.beginPath();

  for(let i=0;i<data.length;i++){
    const y = (data[i]/255)*h;
    const x = (i/data.length)*w;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }

  ctx.strokeStyle="#47ffe8";
  ctx.stroke();
}

</script>

</body>
</html>
