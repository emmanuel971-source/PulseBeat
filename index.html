<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détecteur de BPM Spotify</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 450px; margin: auto; }
        input, button { margin: 8px 0; padding: 10px; width: 100%; box-sizing: border-box; }
        #resultat { font-weight: bold; margin-top: 15px; color: #1DB954; /* Vert Spotify */ }
    </style>
</head>
<body>
    <h2>🎶 Trouver le BPM (Spotify)</h2>
    
    <input type="text" id="artiste" placeholder="Artiste (ex: Michael Jackson)">
    <input type="text" id="titre" placeholder="Titre (ex: Billie Jean)">
    <button onclick="chercherBPM()">Chercher le Tempo</button>
    
    <p id="resultat"></p>

    <script>
        // Remplace par tes clés générées sur le Dashboard Spotify
        const clientId = '30f294a07fc646f1b422bb5e2566ca15';
        const clientSecret = 'ffcf9b57be1f4616bb30b97140f1b9c0';

        async function chercherBPM() {
            const artiste = document.getElementById('artiste').value;
            const titre = document.getElementById('titre').value;
            const resultatDiv = document.getElementById('resultat');

            if (!artiste || !titre) {
                resultatDiv.innerText = "Veuillez remplir les deux champs.";
                return;
            }

            resultatDiv.innerText = "Connexion à Spotify en cours...";

            try {
                // 1. Obtenir le jeton d'accès (Token)
                const token = await obtenirTokenSpotify();

                // 2. Chercher la chanson pour obtenir son ID Spotify
                resultatDiv.innerText = "Recherche de la chanson...";
                const query = encodeURIComponent(`track:${titre} artist:${artiste}`);
                const searchReponse = await fetch(`https://api.spotify.com/v1/search?q=${query}&type=track&limit=1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const searchData = await searchReponse.json();

                if (!searchData.tracks || searchData.tracks.items.length === 0) {
                    resultatDiv.innerText = "Chanson introuvable sur Spotify.";
                    return;
                }

                const trackId = searchData.tracks.items[0].id;
                const nomTrouve = searchData.tracks.items[0].name;
                const artisteTrouve = searchData.tracks.items[0].artists[0].name;

                // 3. Récupérer les caractéristiques audio (dont le BPM)
                resultatDiv.innerText = "Analyse du tempo...";
                const audioReponse = await fetch(`https://api.spotify.com/v1/audio-features/${trackId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const audioData = await audioReponse.json();
                const bpm = Math.round(audioData.tempo);

                // Affichage final
                resultatDiv.innerText = `✅ Le tempo de "${nomTrouve}" par ${artisteTrouve} est de ${bpm} BPM.`;

            } catch (erreur) {
                resultatDiv.innerText = "Une erreur est survenue lors de la recherche.";
                console.error("Erreur détaillée:", erreur);
            }
        }

        async function obtenirTokenSpotify() {
            const reponse = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Authorization': 'Basic ' + btoa(clientId + ':' + clientSecret)
                },
                body: 'grant_type=client_credentials'
            });
            
            const donnees = await reponse.json();
            return donnees.access_token;
        }
    </script>
</body>
</html>
