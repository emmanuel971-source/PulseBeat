<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPM Detector DJ</title>

<style>
body { background:#0a0a0f; color:#fff; font-family:monospace; padding:20px; text-align:center; }

.meter { width:100%; height:12px; background:#222; position:relative; }
.fill { height:100%; width:0%; background:linear-gradient(90deg,#47ffe8,#e8ff47,#ff4747); }
.threshold { position:absolute; top:0; width:2px; height:100%; background:red; }

canvas { width:100%; height:80px; background:#111; margin-top:10px; }

#phaseCanvas {
  width:200px;
  height:200px;
  margin:20px auto;
  display:block;
}

.lock { color:#47ff8a; }
</style>
</head>

<body>

<h2>BPM Detector DJ Mode</h2>

<div class="meter">
  <div class="fill" id="meter"></div>
  <div class="threshold" id="threshold"></div>
</div>

<div id="db">-∞ dB</div>

<canvas id="wave"></canvas>

<canvas id="phaseCanvas"></canvas>

<h1 id="bpm">--</h1>
<div id="state">silence</div>

<button onclick="toggle()">START / STOP</button>

<script>

// ===== AUDIO =====
let ctx, analyser, src, stream, running=false;

// ===== STATE =====
let energyHistory=[], onsetHistory=[], beatTimes=[];
let lastBeat=0, lastOnsetTime=0;
let smoothedBpm=null;

// ===== DJ MODE =====
let beatInterval=null;
let predictedNextBeat=null;

// ===== PARAMS =====
const SENS=1.8;
const SMOOTH=0.75;
const BPM_TIMEOUT=2000;

// ===== UI =====
const meter=document.getElementById("meter");
const bpmEl=document.getElementById("bpm");
const stateEl=document.getElementById("state");
const dbEl=document.getElementById("db");

const canvas=document.getElementById("wave");
const ctxWave=canvas.getContext("2d");

const phaseCanvas=document.getElementById("phaseCanvas");
const ctxPhase=phaseCanvas.getContext("2d");

// ===== START =====
async function toggle(){

  if(running){
    stream.getTracks().forEach(t=>t.stop());
    ctx.close();
    running=false;
    return;
  }

  ctx=new AudioContext();

  stream=await navigator.mediaDevices.getUserMedia({
    audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }
  });

  src=ctx.createMediaStreamSource(stream);
  analyser=ctx.createAnalyser();
  analyser.fftSize=2048;

  src.connect(analyser);

  running=true;
  loop();
}

// ===== LOOP =====
function loop(){
  if(!running) return;
  requestAnimationFrame(loop);

  const buffer=new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buffer);

  // ENERGY
  let sum=0;
  for(let i=0;i<buffer.length;i++) sum+=buffer[i]*buffer[i];
  let energy=Math.sqrt(sum/buffer.length);

  if(energyHistory.length>0){
    energy=SMOOTH*energyHistory.at(-1)+(1-SMOOTH)*energy;
  }

  energyHistory.push(energy);
  if(energyHistory.length>200) energyHistory.shift();

  // DB + VU
  let db=20*Math.log10(energy);
  dbEl.textContent=isFinite(db)?db.toFixed(1)+" dB":"-∞";

  let norm=(db+60)/60;
  norm=Math.pow(norm,2);
  norm=Math.max(0,Math.min(1,norm));
  meter.style.width=(norm*100)+"%";

  // ONSET
  let diff=energy-(energyHistory.at(-2)||energy);

  onsetHistory.push(diff);
  if(onsetHistory.length>50) onsetHistory.shift();

  const mean=avg(onsetHistory);
  const std=stddev(onsetHistory,mean);
  const threshold=mean+SENS*std;

  const now=performance.now();

  if(diff>threshold && now-lastBeat>180){

    lastBeat=now;
    lastOnsetTime=now;

    // BPM instantané
    if(beatTimes.length>=1){
      const interval=now-beatTimes.at(-1);
      const instantBpm=60000/interval;

      if(instantBpm>40 && instantBpm<220){
        bpmEl.textContent=Math.round(instantBpm);
      }
    }

    beatTimes.push(now);
    if(beatTimes.length>20) beatTimes.shift();

    computeBPM();

    // PHASE LOCK CORRECTION
    if(predictedNextBeat){
      const error=now-predictedNextBeat;

      if(Math.abs(error)<80){
        predictedNextBeat+=error*0.2;
      } else {
        predictedNextBeat=now;
      }
    }
  }

  // TIMEOUT
  if(now-lastOnsetTime>BPM_TIMEOUT){
    bpmEl.textContent="--";
    stateEl.textContent="silence";
    beatTimes=[];
    smoothedBpm=null;
    beatInterval=null;
    predictedNextBeat=null;
  }

  // DJ MODE PHASE
  if(beatInterval && predictedNextBeat){

    while(predictedNextBeat<now){
      predictedNextBeat+=beatInterval;
    }

    const timeToNext=predictedNextBeat-now;
    const phase=1-(timeToNext/beatInterval);

    drawPhase(phase);

    // FLASH AVANT BEAT
    if(timeToNext<30){
      meter.style.background="lime";
    } else {
      meter.style.background="";
    }
  }

  drawWave(buffer);
}

// ===== BPM =====
function computeBPM(){

  if(beatTimes.length<6) return;

  let intervals=[];
  for(let i=1;i<beatTimes.length;i++){
    intervals.push(beatTimes[i]-beatTimes[i-1]);
  }

  const avgInt=avg(intervals);
  const bpm=60000/avgInt;

  if(bpm<40||bpm>220) return;

  if(smoothedBpm===null){
    smoothedBpm=bpm;
  } else {
    smoothedBpm=0.7*smoothedBpm+0.3*bpm;
  }

  bpmEl.textContent=Math.round(smoothedBpm);

  beatInterval=60000/smoothedBpm;
  predictedNextBeat=lastBeat;

  const stability=stddev(intervals,avgInt)/avgInt;

  if(stability<0.1){
    stateEl.textContent="LOCKED";
    stateEl.className="lock";
  } else {
    stateEl.textContent="tracking";
    stateEl.className="";
  }
}

// ===== PHASE DRAW =====
function drawPhase(phase){

  const w=phaseCanvas.width=200;
  const h=phaseCanvas.height=200;

  ctxPhase.clearRect(0,0,w,h);

  const cx=w/2;
  const cy=h/2;
  const r=80;

  ctxPhase.beginPath();
  ctxPhase.arc(cx,cy,r,0,Math.PI*2);
  ctxPhase.strokeStyle="#333";
  ctxPhase.stroke();

  ctxPhase.beginPath();
  ctxPhase.arc(cx,cy,r,-Math.PI/2,(-Math.PI/2)+(phase*2*Math.PI));
  ctxPhase.strokeStyle="#47ffe8";
  ctxPhase.lineWidth=4;
  ctxPhase.stroke();
}

// ===== WAVE =====
function drawWave(buffer){
  const w=canvas.width=canvas.offsetWidth;
  const h=canvas.height=canvas.offsetHeight;

  ctxWave.clearRect(0,0,w,h);
  ctxWave.beginPath();

  for(let i=0;i<buffer.length;i++){
    const x=(i/buffer.length)*w;
    const y=(buffer[i]*0.5+0.5)*h;
    i===0?ctxWave.moveTo(x,y):ctxWave.lineTo(x,y);
  }

  ctxWave.strokeStyle="#47ffe8";
  ctxWave.stroke();
}

// ===== MATH =====
function avg(a){ return a.reduce((x,y)=>x+y,0)/a.length; }
function stddev(a,m){
  return Math.sqrt(a.reduce((s,v)=>s+(v-m)*(v-m),0)/a.length);
}

</script>

</body>
</html>
