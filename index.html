<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>かなDROP ✨ PRO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Fredoka+One&display=swap');

:root {
  --bg: #030d1a; --surface: #061528; --border: #0a3050;
  --cyan: #00e5ff; --teal: #00c9a7; --green: #4dffb0;
  --blue: #2979ff; --gold: #ffe94d; --coral: #ff6b6b;
  --text: #d0f4ff; --dim: #2a6080;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP', sans-serif; overflow:hidden; touch-action:none; height:100dvh; }

/* --- ANIMATIONS --- */
@keyframes shake {
  0%, 100% { transform:translate(0,0); }
  20% { transform:translate(-4px, 4px); }
  40% { transform:translate(4px, -4px); }
  60% { transform:translate(-4px, -4px); }
  80% { transform:translate(4px, 4px); }
}
.shake-anim { animation: shake 0.2s ease-in-out; }

@keyframes praiseAnim {
  0% { transform:translateY(30px); opacity:0; }
  20% { transform:translateY(0); opacity:1; }
  80% { transform:translateY(-10px); opacity:1; }
  100% { transform:translateY(-40px); opacity:0; }
}
.praise-banner {
    position:absolute; width:100%; text-align:center; top:20%;
    font-family:'Fredoka One'; font-size:2rem; color:var(--gold);
    text-shadow:0 0 15px rgba(255,233,77,0.8); z-index:100;
    pointer-events:none; animation:praiseAnim 1.8s forwards;
}

@keyframes mascotJump {
  0%, 100% { transform:translateY(0) scale(1); }
  50% { transform:translateY(-35px) scale(1.1) rotate(10deg); }
}
.mascot-jump { animation: mascotJump 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

/* --- STRUCTURE --- */
#shell { display:flex; flex-direction:column; height:100dvh; max-width:480px; margin:0 auto; background:var(--bg); border:1px solid var(--border); }
#top-bar { height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; border-bottom:2px solid var(--border); background:var(--surface); }
#middle { flex:1; display:flex; min-height:0; position:relative; }

#board-container { flex:3; position:relative; background:#020a14; overflow:hidden; display:flex; flex-direction:column; }
#board { display:grid; grid-template-columns:repeat(8, 1fr); grid-template-rows:repeat(12, 1fr); flex:1; }

.cell { display:flex; align-items:center; justify-content:center; font-size:clamp(1rem, 6vw, 1.8rem); font-weight:900; border:1px solid rgba(10,37,64,0.5); position:relative; }
.cell.filled { background:linear-gradient(160deg,#031a30,#04253d); color:var(--cyan); transition: background 0.2s; }
.cell.active { color:#fff; text-shadow:0 0 10px var(--cyan); border-color:var(--cyan); z-index:10; }
.cell.ghost { color:rgba(0,229,255,0.1); border:1px dashed rgba(0,229,255,0.05); }
.cell.glowing { animation: glow 0.5s infinite alternate; }
@keyframes glow { from { opacity:1; } to { opacity:0.5; text-shadow:0 0 10px var(--gold); } }

#side-panel { width:90px; background:var(--surface); border-left:2px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:15px 0; gap:15px; }
#next-box { width:55px; height:55px; background:#042040; border:2px solid var(--cyan); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:bold; }
.mascot-area { flex:1; display:flex; align-items:flex-end; padding-bottom:30px; font-size:3.5rem; }

#word-panel { height:120px; background:var(--surface); border-top:3px solid var(--border); padding:10px; overflow-y:auto; }

#overlay { position:absolute; inset:0; background:rgba(2,8,20,0.95); z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
.hidden { display:none !important; }
.btn-start { background:var(--cyan); color:#001a28; border:none; padding:18px 40px; border-radius:50px; font-family:'Fredoka One'; cursor:pointer; font-size:1.2rem; box-shadow:0 5px 20px rgba(0,229,255,0.4); margin-top:20px; }
</style>
</head>
<body>

<div id="shell">
    <div id="top-bar">
        <div style="font-family:'Fredoka One'; color:var(--cyan)">かなDROP</div>
        <div id="score-val" style="font-family:'Fredoka One'; color:var(--gold); font-size:1.4rem;">0</div>
    </div>

    <div id="middle">
        <div id="board-container">
            <div id="board"></div>
            <div id="overlay">
                <h1 style="color:var(--cyan); font-family:'Fredoka One'; font-size:2.5rem; margin-bottom:10px;">PRET ?</h1>
                <p>Formez des mots Japonais !<br>← → Swipe | Appui long = Drop</p>
                <button class="btn-start" id="start-btn">JOUER ✨</button>
            </div>
        </div>

        <div id="side-panel">
            <div style="font-size:10px; color:var(--teal)">NEXT</div>
            <div id="next-box">?</div>
            <div class="mascot-area" id="mascot">🐱</div>
        </div>
    </div>

    <div id="word-panel" id="word-list"></div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  CONFIGURATION & DATA
// ════════════════════════════════════════════════════════
const COLS=8, ROWS=12; // Nombre de lignes FIXE
let gameRunning = false, resolvingWords = false;
let board = [], active = null, nextChar = '', score = 0, speed = 1200;
let lastChar = '', foundRound = new Set();

const LEVELS = [
  { words: [
    {kana:'いぬ', romaji:'inu', meaning:'chien', emoji:'🐶'},
    {kana:'ねこ', romaji:'neko', meaning:'chat', emoji:'🐱'},
    {kana:'うし', romaji:'ushi', meaning:'vache', emoji:'🐮'},
    {kana:'うま', romaji:'uma', meaning:'cheval', emoji:'🐴'},
    {kana:'ねずみ',romaji:'nezumi', meaning:'souris', emoji:'🐭', boss:true}
  ]}
];
const currentLevel = 0;
const PRAISES = [
    {jp:"やったー！", fr:"Réussi !"}, {jp:"すごい！", fr:"Génial !"},
    {jp:"素晴らしい！", fr:"Magnifique !"}, {jp:"完璧！", fr:"Parfait !"}
];

// ════════════════════════════════════════════════════════
//  AUDIO ENGINE (PRO BUFFER)
// ════════════════════════════════════════════════════════
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioBuffers = {};

async function preloadSfx(name, url) {
    try {
        const res = await fetch(url);
        const arrayBuf = await res.arrayBuffer();
        audioBuffers[name] = await audioCtx.decodeAudioData(arrayBuf);
    } catch(e) {}
}

function playSfx(name) {
    if (!audioBuffers[name] || audioCtx.state === 'suspended') return;
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffers[name];
    source.connect(audioCtx.destination);
    source.start(0);
}

function playVoice(charOrWord) {
    const url = `https://raw.githubusercontent.com/emmanuel971-source/hirakataquizz/main/${encodeURIComponent(charOrWord)}.mp3`;
    new Audio(url).play().catch(()=>{});
}

// ════════════════════════════════════════════════════════
//  GAME LOGIC
// ════════════════════════════════════════════════════════
function initBoard() {
    const grid = document.getElementById('board');
    grid.innerHTML = '';
    board = Array.from({length: ROWS}, () => Array.from({length: COLS}, () => ({filled: false, char: ''})));
    for(let i=0; i<ROWS*COLS; i++) {
        const c = document.createElement('div');
        c.className = 'cell';
        grid.appendChild(c);
    }
}

function getSmartChar() {
    let pool = [];
    LEVELS[currentLevel].words.forEach(w => {
        pool.push(...w.kana.split('')); // Toujours là
        if (!foundRound.has(w.kana)) pool.push(...w.kana.split('')); // Bonus si pas encore fait
    });
    let filtered = pool.filter(c => c !== lastChar);
    if (filtered.length === 0) filtered = pool;
    const chosen = filtered[Math.floor(Math.random() * filtered.length)];
    lastChar = chosen;
    return chosen;
}

function spawn() {
    if (!nextChar) nextChar = getSmartChar();
    active = { x: 3, y: 0, char: nextChar };
    nextChar = getSmartChar();
    document.getElementById('next-box').textContent = nextChar;
    if (board[active.y][active.x].filled) return gameOver();
    render();
}

function render() {
    const cells = document.querySelectorAll('.cell');
    const gy = getGhostY();
    board.forEach((row, r) => {
        row.forEach((col, c) => {
            const idx = r * COLS + c;
            const el = cells[idx];
            el.className = 'cell' + (col.filled ? ' filled' : '');
            el.textContent = col.char || '';

            if (active && r === active.y && c === active.x) {
                el.classList.add('active');
                el.textContent = active.char;
            } else if (active && r === gy && c === active.x && !col.filled) {
                el.classList.add('ghost');
                el.textContent = active.char;
            }
        });
    });
    // Optionnel : Indices visuels (brillance)
    highlightHints();
}

function getGhostY() {
    if (!active) return -1;
    let y = active.y;
    while (y + 1 < ROWS && !board[y+1][active.x].filled) y++;
    return y;
}

// ════════════════════════════════════════════════════════
//  CASQUADE & DÉTECTION (Ta logique originale optimisée)
// ════════════════════════════════════════════════════════
async function checkWords() {
    resolvingWords = true;
    let found = [];

    // Horizontal
    for(let r=0; r<ROWS; r++) {
        let rowStr = board[r].map(c => c.char || ' ').join('');
        LEVELS[currentLevel].words.forEach(w => {
            let startIdx = rowStr.indexOf(w.kana);
            if (startIdx !== -1) found.push({word: w, coords: w.kana.split('').map((_,i)=>[r, startIdx+i])});
        });
    }

    // Vertical
    for(let c=0; c<COLS; c++) {
        let colStr = "";
        for(let r=0; r<ROWS; r++) colStr += board[r][c].char || ' ';
        LEVELS[currentLevel].words.forEach(w => {
            let startIdx = colStr.indexOf(w.kana);
            if (startIdx !== -1) found.push({word: w, coords: w.kana.split('').map((_,i)=>[startIdx+i, c])});
        });
    }

    if (found.length > 0) {
        for (let item of found) {
            await resolveFoundWord(item);
        }
        await applyGravity();
        return checkWords(); // Récursif pour les cascades
    }
    resolvingWords = false;
    if (gameRunning) spawn();
}

async function resolveFoundWord(item) {
    const {word, coords} = item;
    foundRound.add(word.kana);
    score += word.kana.length * 100;
    speed = Math.max(300, speed - 50);
    document.getElementById('score-val').textContent = score;

    playVoice(word.kana);
    showPraise();
    animateMascot(word.emoji);

    coords.forEach(([r,c]) => { board[r][c] = {filled:false, char:''}; });

    if (word.boss) {
        triggerShake();
        // Efface la ligne la plus basse
        for(let r=ROWS-1; r>=0; r--) {
            if (board[r].some(cell => cell.filled)) {
                board[r] = Array.from({length: COLS}, () => ({filled: false, char: ''}));
                break;
            }
        }
    }
    render();
    await new Promise(r => setTimeout(r, 300));
}

async function applyGravity() {
    let moved = true;
    while(moved) {
        moved = false;
        for(let c=0; c<COLS; c++) {
            for(let r=ROWS-2; r>=0; r--) {
                if (board[r][c].filled && !board[r+1][c].filled) {
                    board[r+1][c] = board[r][c];
                    board[r][c] = {filled:false, char:''};
                    moved = true;
                }
            }
        }
        if (moved) { render(); await new Promise(r => setTimeout(r, 80)); }
    }
}

// ════════════════════════════════════════════════════════
//  INTERACTION & FEEDBACK
// ════════════════════════════════════════════════════════
let touchStart = {x:0, y:0, t:0}, longPressTimer;

document.addEventListener('touchstart', e => {
    if (!gameRunning || resolvingWords) return;
    const t = e.touches[0];
    touchStart = {x: t.clientX, y: t.clientY, t: Date.now()};

    longPressTimer = setTimeout(() => {
        if (active) { hardDrop(); }
    }, 500);
});

document.addEventListener('touchend', e => {
    clearTimeout(longPressTimer);
    if (!gameRunning || resolvingWords || !active) return;
    
    const duration = Date.now() - touchStart.t;
    if (duration < 500) {
        const dx = e.changedTouches[0].clientX - touchStart.x;
        const dy = e.changedTouches[0].clientY - touchStart.y;
        
        if (Math.abs(dx) > 30) {
            const dir = dx > 0 ? 1 : -1;
            if (ok(active.x + dir, active.y)) { active.x += dir; render(); }
        } else if (dy > 40) {
            moveDown();
        }
    }
});

function ok(x, y) { return x>=0 && x<COLS && y>=0 && y<ROWS && !board[y][x].filled; }

function moveDown() {
    if (!active) return;
    if (ok(active.x, active.y + 1)) {
        active.y++;
        render();
    } else {
        lock();
    }
}

function hardDrop() {
    if (!active) return;
    while(ok(active.x, active.y + 1)) active.y++;
    triggerShake();
    lock();
}

function lock() {
    board[active.y][active.x] = {filled:true, char:active.char};
    playSfx('drop');
    active = null;
    checkWords();
}

function triggerShake() {
    const bc = document.getElementById('board-container');
    bc.classList.add('shake-anim');
    setTimeout(() => bc.classList.remove('shake-anim'), 300);
}

function showPraise() {
    const p = PRAISES[Math.floor(Math.random()*PRAISES.length)];
    const b = document.createElement('div');
    b.className = 'praise-banner';
    b.innerHTML = `${p.jp}<br><span style="font-size:1.1rem">${p.fr}</span>`;
    document.getElementById('board-container').appendChild(b);
    setTimeout(() => b.remove(), 1800);
}

function animateMascot(emoji) {
    const m = document.getElementById('mascot');
    m.textContent = emoji;
    m.classList.remove('mascot-jump');
    void m.offsetWidth;
    m.classList.add('mascot-jump');
}

function highlightHints() {
    if (!active) return;
    const gy = getGhostY();
    LEVELS[currentLevel].words.forEach(w => {
        // Logique de brillance si le placement complète un mot...
    });
}

function gameOver() {
    gameRunning = false;
    alert("Fin de partie ! Score : " + score);
    document.getElementById('overlay').classList.remove('hidden');
}

// ════════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════════
function loop() {
    if (!gameRunning) return;
    if (!resolvingWords) moveDown();
    setTimeout(loop, speed);
}

document.getElementById('start-btn').onclick = () => {
    audioCtx.resume();
    document.getElementById('overlay').classList.add('hidden');
    initBoard();
    score = 0; speed = 1200; foundRound.clear();
    gameRunning = true;
    spawn();
    loop();
};

// Préchargement
preloadSfx('drop', 'https://actions.google.com/sounds/v1/water/drop_water_bucket.ogg');
</script>
</body>
</html>
