<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひらがなテトリス — Hiragana Tetris</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Zen+Dots&family=Sawarabi+Gothic&display=swap');

  :root {
    --bg: #0a0a14;
    --panel: #12121f;
    --border: #2a2a4a;
    --accent: #e8c84a;
    --accent2: #4ae8c8;
    --accent3: #e84a8c;
    --text: #e8e8f8;
    --dim: #6a6a9a;
    --cell-size: 50px;
    --cols: 8;
    --rows: 14;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(78, 90, 232, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 20%, rgba(232, 78, 140, 0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 18px;
    align-items: flex-start;
    padding: 16px;
  }

  .left-panel, .right-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .left-panel { width: 170px; }
  .right-panel { width: 200px; }

  .panel-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }

  .panel-label {
    font-family: 'Zen Dots', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .score-value {
    font-family: 'Zen Dots', monospace;
    font-size: 26px;
    color: var(--accent);
    line-height: 1;
  }

  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 2px; transition: width 0.4s ease; }

  #next-display {
    display: flex; align-items: center; justify-content: center;
    min-height: 64px; margin-top: 4px;
  }
  .next-kana-cell {
    width: 58px; height: 58px; border-radius: 10px; font-size: 28px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #2a4a8e, #4a2a8e);
    border: 1px solid rgba(140,180,255,0.6);
    color: #fff;
    box-shadow: 0 0 16px rgba(100,140,255,0.3);
  }

  .mission-list { display: flex; flex-direction: column; gap: 8px; }

  .mission-item {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 8px 10px;
    transition: all 0.4s ease;
  }
  .mission-item.found {
    background: rgba(78, 232, 200, 0.08);
    border-color: rgba(78,232,200,0.4);
    opacity: 0.55;
  }
  .mission-item.found .m-kana { text-decoration: line-through; color: var(--accent2); }

  .m-emoji { font-size: 22px; line-height: 1; flex-shrink: 0; }
  .m-info { flex: 1; min-width: 0; }
  .m-kana { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .m-sub  { font-size: 10px; color: var(--dim); letter-spacing: 0.5px; }
  .m-check { font-size: 18px; opacity: 0; transition: opacity 0.3s; }
  .mission-item.found .m-check { opacity: 1; }

  .level-badge {
    font-family: 'Zen Dots', monospace;
    font-size: 11px; letter-spacing: 2px;
    color: var(--accent); text-align: center;
    padding: 4px 0 2px;
  }
  .level-theme {
    font-size: 11px; color: var(--dim); text-align: center; margin-top: 2px;
  }

  .word-history { display: flex; flex-direction: column; gap: 5px; max-height: 160px; overflow-y: auto; }
  .word-entry {
    background: rgba(78,232,200,0.05);
    border: 1px solid rgba(78,232,200,0.15);
    border-radius: 7px; padding: 7px 9px;
    animation: slideIn 0.3s ease;
  }
  .word-entry .w-kana { font-size: 16px; color: var(--accent2); font-weight: 700; }
  .word-entry .w-sub  { font-size: 10px; color: var(--dim); }
  @keyframes slideIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:none; } }

  .game-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }

  .game-title {
    font-family: 'Zen Dots', monospace; font-size: 12px;
    letter-spacing: 4px; color: var(--dim); text-align: center;
  }
  .game-title span { color: var(--accent); }

  #board-container { position: relative; }

  #board {
    display: grid;
    grid-template-columns: repeat(var(--cols), var(--cell-size));
    grid-template-rows: repeat(var(--rows), var(--cell-size));
    gap: 2px;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }

  .cell {
    width: var(--cell-size); height: var(--cell-size);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 21px; font-weight: 700;
    user-select: none;
  }
  .cell.empty {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
  }
  .cell.filled {
    background: linear-gradient(135deg, #1e2a5e, #2a1e5e);
    border: 1px solid rgba(100,120,255,0.4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 6px rgba(0,0,0,0.5);
    color: #c8d4ff;
  }
  .cell.active {
    background: linear-gradient(135deg, #2a4a8e, #4a2a8e);
    border: 1px solid rgba(140,180,255,0.7);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 14px rgba(100,140,255,0.5);
    color: #fff;
    animation: pulse 0.9s ease infinite alternate;
  }
  @keyframes pulse {
    from { box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 8px rgba(100,140,255,0.3); }
    to   { box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 22px rgba(100,140,255,0.65); }
  }
  .cell.ghost {
    background: rgba(100,140,255,0.05);
    border: 1px dashed rgba(100,140,255,0.22);
    color: rgba(200,212,255,0.28);
  }
  .cell.highlight-word {
    animation: wordFlash 0.65s ease forwards !important;
  }
  @keyframes wordFlash {
    0%   { background:#e8c84a; color:#0a0a14; transform:scale(1.12); }
    50%  { background:#4ae8c8; color:#0a0a14; }
    100% { opacity:0; transform:scale(0.8); }
  }

  .word-popup {
    position: absolute; left: 50%; top: 40%;
    transform: translate(-50%, -50%);
    background: linear-gradient(135deg, rgba(10,10,20,0.97), rgba(20,10,40,0.97));
    border: 2px solid var(--accent);
    border-radius: 16px; padding: 18px 28px;
    text-align: center; pointer-events: none; z-index: 10;
    animation: popupAnim 1.9s ease forwards;
    min-width: 190px;
  }
  .word-popup .pop-emoji  { font-size: 36px; display:block; margin-bottom: 4px; }
  .word-popup .pop-kana   { font-size: 32px; color: var(--accent); font-weight: 900; display:block; }
  .word-popup .pop-romaji { font-size: 13px; color: var(--accent2); letter-spacing: 2px; margin: 3px 0; }
  .word-popup .pop-meaning{ font-size: 14px; color: var(--text); }
  .word-popup .pop-score  { font-family:'Zen Dots',monospace; font-size:20px; color:var(--accent3); margin-top:8px; }
  @keyframes popupAnim {
    0%   { opacity:0; transform:translate(-50%,-60%) scale(0.7); }
    12%  { opacity:1; transform:translate(-50%,-65%) scale(1.06); }
    75%  { opacity:1; transform:translate(-50%,-65%) scale(1); }
    100% { opacity:0; transform:translate(-50%,-72%) scale(0.92); }
  }

  .controls-hint { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .key-hint { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--dim); }
  .key {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 6px;
    font-family: 'Zen Dots', monospace; font-size: 9px; color: var(--text);
  }

  #pause-btn {
    background:transparent; border:1px solid var(--border); color:var(--dim);
    border-radius:6px; padding:5px 12px;
    font-family:'Zen Dots',monospace; font-size:10px; cursor:pointer; transition:all 0.2s;
  }
  #pause-btn:hover { border-color:var(--accent); color:var(--accent); }

  .overlay {
    position:absolute; inset:0;
    background:rgba(10,10,20,0.93);
    border-radius:8px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; z-index:20; backdrop-filter:blur(4px);
    padding: 24px;
  }
  .overlay h1 {
    font-family:'Zen Dots',monospace; font-size:24px;
    color:var(--accent); text-align:center; line-height:1.4;
  }
  .overlay p { color:var(--dim); text-align:center; font-size:13px; line-height:1.8; max-width:300px; }

  .btn {
    background:var(--accent); color:#0a0a14;
    border:none; border-radius:8px; padding:11px 28px;
    font-family:'Zen Dots',monospace; font-size:13px; cursor:pointer; transition:all 0.2s;
  }
  .btn:hover { background:#f0d86a; transform:translateY(-2px); box-shadow:0 6px 20px rgba(232,200,74,0.3); }
  .btn-secondary {
    background:transparent; color:var(--dim); border:1px solid var(--border);
    border-radius:8px; padding:9px 20px;
    font-family:'Zen Dots',monospace; font-size:11px; cursor:pointer; transition:all 0.2s;
  }
  .btn-secondary:hover { border-color:var(--accent2); color:var(--accent2); }

  .levelup-words {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 320px;
  }
  .lw-item {
    background: rgba(78,232,200,0.07); border: 1px solid rgba(78,232,200,0.2);
    border-radius: 8px; padding: 6px 12px; font-size: 13px; text-align: center;
  }
  .lw-item .lw-kana { color: var(--accent2); font-weight: 700; font-size: 16px; }
  .lw-item .lw-sub  { color: var(--dim); font-size: 10px; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- LEFT -->
  <div class="left-panel">
    <div class="panel-box">
      <div class="panel-label">Score</div>
      <div class="score-value" id="score-display">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Suivant</div>
      <div id="next-display"></div>
    </div>
    <div class="panel-box" style="flex:1">
      <div class="panel-label">Mots trouvés</div>
      <div class="word-history" id="word-history"></div>
    </div>
  </div>

  <!-- BOARD -->
  <div class="game-area">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="game-title">ひ<span>RAGANA</span> テトリス</div>
      <button id="pause-btn">❚❚ Pause</button>
    </div>
    <div id="board-container">
      <div id="board"></div>
    </div>
    <div class="controls-hint">
      <div class="key-hint"><div class="key">← →</div> Déplacer</div>
      <div class="key-hint"><div class="key">↓</div> Accélérer</div>
      <div class="key-hint"><div class="key">Space</div> Chute</div>
    </div>
  </div>

  <!-- RIGHT — MISSIONS -->
  <div class="right-panel">
    <div class="panel-box">
      <div class="level-badge" id="level-badge">NIVEAU 1</div>
      <div class="level-theme" id="level-theme">Animaux • 2 syllabes</div>
      <div class="progress-bar" style="margin-top:10px">
        <div class="progress-fill" id="level-progress" style="width:0%"></div>
      </div>
    </div>
    <div class="panel-box" style="flex:1">
      <div class="panel-label">Mots à former 🎯</div>
      <div class="mission-list" id="mission-list"></div>
    </div>
  </div>

</div>
<script>
// ══════════════════════════════════════════════════════════════════
//  LEVEL DEFINITIONS
// ══════════════════════════════════════════════════════════════════
const LEVELS = [
  {
    id:1, theme:'Animaux • 2 syllabes', speed:1500,
    words:[
      {kana:'いぬ',  romaji:'inu',   meaning:'chien',  emoji:'🐕'},
      {kana:'ねこ',  romaji:'neko',  meaning:'chat',   emoji:'🐈'},
      {kana:'うし',  romaji:'ushi',  meaning:'vache',  emoji:'🐄'},
      {kana:'うま',  romaji:'uma',   meaning:'cheval', emoji:'🐎'},
      {kana:'くま',  romaji:'kuma',  meaning:'ours',   emoji:'🐻'},
    ]
  },
  {
    id:2, theme:'Animaux • 2 syllabes (suite)', speed:1400,
    words:[
      {kana:'さる',  romaji:'saru',  meaning:'singe',   emoji:'🐒'},
      {kana:'とり',  romaji:'tori',  meaning:'oiseau',  emoji:'🐦'},
      {kana:'かめ',  romaji:'kame',  meaning:'tortue',  emoji:'🐢'},
      {kana:'へび',  romaji:'hebi',  meaning:'serpent', emoji:'🐍'},
      {kana:'かに',  romaji:'kani',  meaning:'crabe',   emoji:'🦀'},
    ]
  },
  {
    id:3, theme:'Animaux • 3 syllabes', speed:1300,
    words:[
      {kana:'ねずみ', romaji:'nezumi', meaning:'souris',  emoji:'🐭'},
      {kana:'うさぎ', romaji:'usagi',  meaning:'lapin',   emoji:'🐰'},
      {kana:'たぬき', romaji:'tanuki', meaning:'raton',   emoji:'🦝'},
      {kana:'あひる', romaji:'ahiru',  meaning:'canard',  emoji:'🦆'},
      {kana:'きつね', romaji:'kitsune',meaning:'renard',  emoji:'🦊'},
    ]
  },
  {
    id:4, theme:'Couleurs', speed:1200,
    words:[
      {kana:'あか',   romaji:'aka',   meaning:'rouge',  emoji:'🔴'},
      {kana:'あお',   romaji:'ao',    meaning:'bleu',   emoji:'🔵'},
      {kana:'しろ',   romaji:'shiro', meaning:'blanc',  emoji:'⚪'},
      {kana:'くろ',   romaji:'kuro',  meaning:'noir',   emoji:'⚫'},
      {kana:'みどり', romaji:'midori',meaning:'vert',   emoji:'🟢'},
    ]
  },
  {
    id:5, theme:'Nourriture', speed:1100,
    words:[
      {kana:'すし',  romaji:'sushi',  meaning:'sushi',  emoji:'🍣'},
      {kana:'みそ',  romaji:'miso',   meaning:'miso',   emoji:'🍜'},
      {kana:'そば',  romaji:'soba',   meaning:'soba',   emoji:'🍜'},
      {kana:'にく',  romaji:'niku',   meaning:'viande', emoji:'🥩'},
      {kana:'みず',  romaji:'mizu',   meaning:'eau',    emoji:'💧'},
    ]
  },
  {
    id:6, theme:'Nourriture (suite)', speed:1000,
    words:[
      {kana:'りんご', romaji:'ringo',  meaning:'pomme',      emoji:'🍎'},
      {kana:'うどん', romaji:'udon',   meaning:'udon',       emoji:'🍜'},
      {kana:'たまご', romaji:'tamago', meaning:'œuf',        emoji:'🥚'},
      {kana:'みかん', romaji:'mikan',  meaning:'mandarine',  emoji:'🍊'},
      {kana:'おちゃ', romaji:'ocha',   meaning:'thé vert',   emoji:'🍵'},
    ]
  },
  {
    id:7, theme:'Corps & Visage', speed:900,
    words:[
      {kana:'め',    romaji:'me',    meaning:'œil',     emoji:'👁️'},
      {kana:'て',    romaji:'te',    meaning:'main',    emoji:'✋'},
      {kana:'はな',  romaji:'hana',  meaning:'nez',     emoji:'👃'},
      {kana:'くち',  romaji:'kuchi', meaning:'bouche',  emoji:'👄'},
      {kana:'みみ',  romaji:'mimi',  meaning:'oreille', emoji:'👂'},
    ]
  },
  {
    id:8, theme:'Famille', speed:820,
    words:[
      {kana:'ちち',    romaji:'chichi', meaning:'père',        emoji:'👨'},
      {kana:'はは',    romaji:'haha',   meaning:'mère',        emoji:'👩'},
      {kana:'あに',    romaji:'ani',    meaning:'grand frère', emoji:'👦'},
      {kana:'いもうと',romaji:'imōto',  meaning:'petite sœur', emoji:'👧'},
      {kana:'そふ',    romaji:'sofu',   meaning:'grand-père',  emoji:'👴'},
    ]
  },
  {
    id:9, theme:'Quotidien', speed:740,
    words:[
      {kana:'いえ',   romaji:'ie',    meaning:'maison',    emoji:'🏠'},
      {kana:'ほん',   romaji:'hon',   meaning:'livre',     emoji:'📚'},
      {kana:'かさ',   romaji:'kasa',  meaning:'parapluie', emoji:'☂️'},
      {kana:'くるま', romaji:'kuruma',meaning:'voiture',   emoji:'🚗'},
      {kana:'かぎ',   romaji:'kagi',  meaning:'clé',       emoji:'🔑'},
    ]
  },
  {
    id:10, theme:'Mix • Défi final !', speed:640,
    words:[
      {kana:'はなび', romaji:'hanabi', meaning:"feux d'artifice", emoji:'🎆'},
      {kana:'さかな', romaji:'sakana', meaning:'poisson',         emoji:'🐟'},
      {kana:'てがみ', romaji:'tegami', meaning:'lettre',          emoji:'✉️'},
      {kana:'きいろ', romaji:'kiiro',  meaning:'jaune',           emoji:'🟡'},
      {kana:'ぶどう', romaji:'budō',   meaning:'raisin',          emoji:'🍇'},
    ]
  },
];

// ══════════════════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════════════════
const COLS = 8, ROWS = 14;
let board = [];
let active = null;
let nextChar = '';
let score = 0;
let currentLevelIdx = 0;
let foundInLevel = new Set();
let gameRunning = false, paused = false;
let dropInterval;
let kanaPool = [];
let waitingForNext = false; // prevent double spawn during word flash

function getLevelDef() { return LEVELS[currentLevelIdx]; }

function buildKanaPool() {
  const lv = getLevelDef();
  kanaPool = lv.words.flatMap(w => [...w.kana]);
}

function randomKana() {
  return kanaPool[Math.floor(Math.random() * kanaPool.length)];
}

function initBoard() {
  board = Array.from({length: ROWS}, () =>
    Array.from({length: COLS}, () => ({filled: false, char: ''}))
  );
}

// ══════════════════════════════════════════════════════════════════
//  PIECE MOVEMENT
// ══════════════════════════════════════════════════════════════════
function spawnKana() {
  waitingForNext = false;
  active = {char: nextChar || randomKana(), x: Math.floor(COLS / 2), y: 0};
  nextChar = randomKana();
  renderNext();
  if (board[0][active.x].filled) { endGame(); return; }
  render();
}

function canMoveTo(x, y) {
  return x >= 0 && x < COLS && y < ROWS && (y < 0 || !board[y][x].filled);
}

function placeKana() {
  if (!active) return;
  if (active.y < 0) { endGame(); return; }
  board[active.y][active.x] = {filled: true, char: active.char};
  active = null;
  waitingForNext = true;
  checkWords();
}

// ══════════════════════════════════════════════════════════════════
//  WORD DETECTION
// ══════════════════════════════════════════════════════════════════
function checkWords() {
  const lv = getLevelDef();
  const found = [];
  const seenKana = new Set();

  function scanLine(cells) {
    const line = cells.map(({r,c}) => board[r][c].filled ? board[r][c].char : '\x00').join('');
    lv.words.forEach(w => {
      if (foundInLevel.has(w.kana) || seenKana.has(w.kana)) return;
      let idx = line.indexOf(w.kana);
      if (idx !== -1) {
        seenKana.add(w.kana);
        found.push({word: w, cells: Array.from({length: w.kana.length}, (_, i) => cells[idx + i])});
      }
    });
  }

  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    scanLine(Array.from({length: COLS}, (_, c) => ({r, c})));
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    scanLine(Array.from({length: ROWS}, (_, r) => ({r, c})));
  }

  if (found.length > 0) {
    const allCells = new Set();
    found.forEach(f => {
      foundInLevel.add(f.word.kana);
      f.cells.forEach(cell => allCells.add(`${cell.r},${cell.c}`));
    });

    // Flash
    allCells.forEach(key => {
      const [r, c] = key.split(',').map(Number);
      const el = getCellEl(r, c);
      if (el) el.classList.add('highlight-word');
    });

    const pts = found.reduce((sum, f) => sum + f.word.kana.length * 120 * (currentLevelIdx + 1), 0);
    score += pts;
    showWordPopup(found[0].word, pts);
    found.forEach(f => addToHistory(f.word));
    updateMissionUI();
    updateScoreUI();

    setTimeout(() => {
      allCells.forEach(key => {
        const [r, c] = key.split(',').map(Number);
        board[r][c] = {filled: false, char: ''};
        const el = getCellEl(r, c);
        if (el) { el.className = 'cell empty'; el.textContent = ''; }
      });
      applyGravity();
      render();

      if (foundInLevel.size >= lv.words.length) {
        setTimeout(() => showLevelUp(), 300);
      } else {
        spawnKana();
      }
    }, 800);
  } else {
    spawnKana();
  }
}

function applyGravity() {
  for (let c = 0; c < COLS; c++) {
    const chars = [];
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c].filled) chars.push(board[r][c].char);
    }
    for (let r = ROWS - 1; r >= 0; r--) {
      board[r][c] = chars.length > 0
        ? {filled: true, char: chars.shift()}
        : {filled: false, char: ''};
    }
  }
}

// ══════════════════════════════════════════════════════════════════
//  RENDERING
// ══════════════════════════════════════════════════════════════════
function getCellEl(r, c) {
  return document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
}

function buildBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell empty';
      cell.dataset.r = r; cell.dataset.c = c;
      boardEl.appendChild(cell);
    }
  }
}

function getGhostY() {
  if (!active) return -1;
  let gy = active.y;
  while (gy + 1 < ROWS && !board[gy + 1][active.x].filled) gy++;
  return gy;
}

function render() {
  const gy = active ? getGhostY() : -1;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = getCellEl(r, c);
      if (!el || el.classList.contains('highlight-word')) continue;

      if (active && r === active.y && c === active.x) {
        el.className = 'cell active'; el.textContent = active.char;
      } else if (active && r === gy && c === active.x && gy !== active.y) {
        el.className = 'cell ghost'; el.textContent = active.char;
      } else if (board[r][c].filled) {
        el.className = 'cell filled'; el.textContent = board[r][c].char;
      } else {
        el.className = 'cell empty'; el.textContent = '';
      }
    }
  }
}

function renderNext() {
  const display = document.getElementById('next-display');
  display.innerHTML = '';
  const cell = document.createElement('div');
  cell.className = 'next-kana-cell';
  cell.textContent = nextChar;
  display.appendChild(cell);
}

function renderMissions() {
  const lv = getLevelDef();
  const list = document.getElementById('mission-list');
  list.innerHTML = '';
  lv.words.forEach(w => {
    const item = document.createElement('div');
    const done = foundInLevel.has(w.kana);
    item.className = 'mission-item' + (done ? ' found' : '');
    item.dataset.kana = w.kana;
    item.innerHTML = `
      <div class="m-emoji">${w.emoji}</div>
      <div class="m-info">
        <div class="m-kana">${w.kana}</div>
        <div class="m-sub">${w.romaji} · ${w.meaning}</div>
      </div>
      <div class="m-check">✓</div>`;
    list.appendChild(item);
  });
  document.getElementById('level-badge').textContent = `NIVEAU ${lv.id}`;
  document.getElementById('level-theme').textContent = lv.theme;
  const pct = (foundInLevel.size / lv.words.length) * 100;
  document.getElementById('level-progress').style.width = pct + '%';
}

function updateMissionUI() {
  const lv = getLevelDef();
  document.querySelectorAll('.mission-item').forEach(item => {
    if (foundInLevel.has(item.dataset.kana)) item.classList.add('found');
  });
  const pct = (foundInLevel.size / lv.words.length) * 100;
  document.getElementById('level-progress').style.width = pct + '%';
}

function showWordPopup(word, pts) {
  document.querySelectorAll('.word-popup').forEach(p => p.remove());
  const popup = document.createElement('div');
  popup.className = 'word-popup';
  popup.innerHTML = `
    <span class="pop-emoji">${word.emoji}</span>
    <span class="pop-kana">${word.kana}</span>
    <div class="pop-romaji">${word.romaji}</div>
    <div class="pop-meaning">${word.meaning}</div>
    <div class="pop-score">+${pts} pts</div>`;
  document.getElementById('board-container').appendChild(popup);
  setTimeout(() => popup.remove(), 1900);
}

function addToHistory(word) {
  const hist = document.getElementById('word-history');
  const entry = document.createElement('div');
  entry.className = 'word-entry';
  entry.innerHTML = `<div class="w-kana">${word.emoji} ${word.kana}</div><div class="w-sub">${word.romaji} · ${word.meaning}</div>`;
  hist.insertBefore(entry, hist.firstChild);
  if (hist.children.length > 10) hist.removeChild(hist.lastChild);
}

function updateScoreUI() {
  document.getElementById('score-display').textContent = score.toLocaleString();
}

// ══════════════════════════════════════════════════════════════════
//  LEVEL TRANSITIONS
// ══════════════════════════════════════════════════════════════════
function showLevelUp() {
  clearInterval(dropInterval);
  gameRunning = false;
  active = null;

  const nextIdx = currentLevelIdx + 1;
  const isLast = nextIdx >= LEVELS.length;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';

  if (isLast) {
    overlay.innerHTML = `
      <h1>🎉 Félicitations !<br><span style="font-size:14px;color:var(--dim)">Tous les niveaux complétés !</span></h1>
      <p>Score final : <strong style="color:var(--accent)">${score.toLocaleString()} pts</strong><br>Tu maîtrises les hiraganas !</p>
      <button class="btn" id="restart-final-btn">Rejouer depuis le début</button>`;
    document.getElementById('board-container').appendChild(overlay);
    document.getElementById('restart-final-btn').onclick = () => { currentLevelIdx = 0; score = 0; updateScoreUI(); startLevel(); };
    return;
  }

  const nextLv = LEVELS[nextIdx];
  overlay.innerHTML = `
    <h1>ステージクリア！<br><span style="font-size:13px;color:var(--dim)">Niveau ${getLevelDef().id} terminé !</span></h1>
    <p style="color:var(--accent2);font-size:12px;letter-spacing:1px;margin-bottom:4px">
      NIVEAU ${nextLv.id} — ${nextLv.theme}
    </p>
    <div class="levelup-words" id="lw-preview"></div>
    <button class="btn" id="nextlevel-btn">Niveau suivant →</button>`;
  document.getElementById('board-container').appendChild(overlay);

  const preview = document.getElementById('lw-preview');
  nextLv.words.forEach(w => {
    const d = document.createElement('div');
    d.className = 'lw-item';
    d.innerHTML = `<div class="lw-kana">${w.emoji} ${w.kana}</div><div class="lw-sub">${w.romaji} · ${w.meaning}</div>`;
    preview.appendChild(d);
  });

  document.getElementById('nextlevel-btn').onclick = () => {
    currentLevelIdx = nextIdx;
    startLevel();
  };
}

// ══════════════════════════════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════════════════════════════
function drop() {
  if (!gameRunning || paused || !active || waitingForNext) return;
  if (canMoveTo(active.x, active.y + 1)) {
    active.y++;
    render();
  } else {
    placeKana();
  }
}

function startLevel() {
  document.getElementById('board-container').querySelectorAll('.overlay').forEach(o => o.remove());
  document.querySelectorAll('.word-popup').forEach(p => p.remove());
  initBoard();
  foundInLevel = new Set();
  waitingForNext = false;
  buildKanaPool();
  active = null;
  nextChar = randomKana();
  gameRunning = true;
  paused = false;
  document.getElementById('pause-btn').textContent = '❚❚ Pause';
  buildBoard();
  renderMissions();
  spawnKana();
  clearInterval(dropInterval);
  dropInterval = setInterval(drop, getLevelDef().speed);
}

function endGame() {
  gameRunning = false;
  active = null;
  clearInterval(dropInterval);
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <h1>ゲームオーバー<br><span style="font-size:14px;color:var(--dim)">Game Over</span></h1>
    <p>Score : <strong style="color:var(--accent)">${score.toLocaleString()}</strong><br>
    Niveau <strong style="color:var(--accent2)">${getLevelDef().id}</strong> —
    ${foundInLevel.size} / ${getLevelDef().words.length} mots trouvés</p>
    <button class="btn" id="retry-btn">Réessayer ce niveau</button>
    <button class="btn-secondary" id="restart-btn">Recommencer depuis le début</button>`;
  document.getElementById('board-container').appendChild(overlay);
  document.getElementById('retry-btn').onclick = startLevel;
  document.getElementById('restart-btn').onclick = () => { currentLevelIdx = 0; score = 0; updateScoreUI(); startLevel(); };
}

function togglePause() {
  if (!gameRunning) return;
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? '▶ Jouer' : '❚❚ Pause';
  if (!paused) { dropInterval = setInterval(drop, getLevelDef().speed); }
  else clearInterval(dropInterval);
}

// ══════════════════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (!gameRunning || paused || !active || waitingForNext) return;
  switch(e.key) {
    case 'ArrowLeft':
      e.preventDefault();
      if (canMoveTo(active.x - 1, active.y)) { active.x--; render(); } break;
    case 'ArrowRight':
      e.preventDefault();
      if (canMoveTo(active.x + 1, active.y)) { active.x++; render(); } break;
    case 'ArrowDown':
      e.preventDefault();
      if (canMoveTo(active.x, active.y + 1)) { active.y++; render(); }
      else placeKana();
      break;
    case ' ':
      e.preventDefault();
      while (canMoveTo(active.x, active.y + 1)) active.y++;
      placeKana(); render(); break;
    case 'p': case 'P': togglePause(); break;
  }
});
document.getElementById('pause-btn').onclick = togglePause;

// ══════════════════════════════════════════════════════════════════
//  START SCREEN
// ══════════════════════════════════════════════════════════════════
function showStartScreen() {
  buildBoard();
  const lv = LEVELS[0];
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <h1>ひらがな<br>テトリス</h1>
    <p>Un hiragana tombe à la fois. Place-les pour former<br>
    les mots du niveau, <strong style="color:var(--accent)">horizontalement<br>ou verticalement</strong> !<br><br>
    Seuls les hiraganas utiles apparaissent.<br>Les mots à trouver sont à droite.<br><br>
    <span style="color:var(--accent)">← →</span> déplacer &nbsp;
    <span style="color:var(--accent)">↓</span> accélérer &nbsp;
    <span style="color:var(--accent)">Espace</span> chute</p>
    <div class="levelup-words">
      ${lv.words.map(w=>`<div class="lw-item"><div class="lw-kana">${w.emoji} ${w.kana}</div><div class="lw-sub">${w.meaning}</div></div>`).join('')}
    </div>
    <button class="btn" id="start-btn">はじめる — Commencer</button>`;
  document.getElementById('board-container').appendChild(overlay);
  document.getElementById('start-btn').onclick = () => {
    currentLevelIdx = 0; score = 0; updateScoreUI(); startLevel();
  };
}

showStartScreen();
</script>
</body>
</html>
