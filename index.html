<!DOCTYPE html>
<html>
<body>
  <p id="ua"></p>
  <p id="tp"></p>
  <p id="pl"></p>
  <script>
    document.getElementById('ua').innerText = 'userAgent: ' + navigator.userAgent;
    document.getElementById('tp').innerText = 'maxTouchPoints: ' + navigator.maxTouchPoints;
    document.getElementById('pl').innerText = 'platform: ' + navigator.platform;
  </script>
</body>
</html>
