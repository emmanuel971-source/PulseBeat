<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>かなDROP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=DotGothic16&display=swap');

:root {
  --bg:      #080c10;
  --surface: #0d1520;
  --border:  #1a2a3a;
  --glow-b:  #00e5ff;
  --glow-g:  #39ff14;
  --glow-p:  #ff2d78;
  --glow-y:  #ffe600;
  --text:    #ddeeff;
  --dim:     #4a6a8a;
  --cell-bg: #0a1520;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP', sans-serif;
  overflow:hidden;
  touch-action:none;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
  pointer-events:none; z-index:100;
}

#shell {
  display:flex; flex-direction:column;
  height:100dvh; max-width:600px; /* Élargi pour accueillir le panneau latéral */ 
  margin:0 auto;
}

/* ── LAYOUT PRINCIPAL ── */
#main-area {
  display: flex; flex: 1; overflow: hidden;
}

#board-wrap {
  flex: 3; /* Prend environ 75% de la largeur */
  position:relative; overflow:hidden;
  display:flex; align-items:stretch;
}

#side-panel {
  flex: 1; /* Prend environ 25% de la largeur */
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  align-items:center; 
  padding: 20px 5px 10px; 
  gap: 25px;
  z-index: 10;
}

#title-logo {
  font-family:'DotGothic16',monospace; font-size:18px;
  color:var(--glow-b); text-shadow:0 0 10px var(--glow-b);
  letter-spacing:2px; text-align:center; line-height:1.2;
}
#score-block { display:flex; flex-direction:column; align-items:center; width: 100%; }
#score-label { font-family:'DotGothic16',monospace; font-size:9px; color:var(--dim); letter-spacing:1px; margin-bottom:4px; }
#score-val   { font-family:'DotGothic16',monospace; font-size:18px; color:var(--glow-y); text-shadow:0 0 8px var(--glow-y); line-height:1; word-break: break-all; text-align: center; }
#next-block  { display:flex; flex-direction:column; align-items:center; gap:6px; }
#next-label  { font-family:'DotGothic16',monospace; font-size:9px; color:var(--dim); letter-spacing:1px; }
#next-kana   {
  width:48px; height:48px; border-radius:8px;
  background:linear-gradient(135deg,#0a2040,#1a0840);
  border:1px solid rgba(0,229,255,0.4);
  box-shadow:0 0 12px rgba(0,229,255,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:26px; font-weight:900; color:#fff;
}

/* ── BOARD AREA ── */
#board {
  display:grid;
  grid-template-columns:repeat(8,1fr);
  width:100%;
  background:var(--surface);
}
.cell {
  aspect-ratio:1;
  display:flex; align-items:center; justify-content:center;
  font-size:clamp(20px, 7vw, 32px); /* Taille de police augmentée ! */
  font-weight:900;
  border:1px solid rgba(255,255,255,0.03);
  user-select:none; position:relative;
}
.cell.empty  { background:var(--cell-bg); }
.cell.filled {
  background:linear-gradient(160deg,#0e2240,#1a0e40);
  border-color:rgba(0,229,255,0.18);
  color:#aad4ff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.07);
}
.cell.active {
  background:linear-gradient(160deg,#0e3a6e,#2a0e6e);
  border-color:rgba(0,229,255,0.65);
  color:#fff;
  animation:activePulse 0.75s ease infinite alternate;
}
@keyframes activePulse {
  from { box-shadow:0 0 8px rgba(0,229,255,0.4); }
  to   { box-shadow:0 0 22px rgba(0,229,255,0.75); }
}
.cell.ghost {
  background:var(--cell-bg);
  border:1px dashed rgba(0,229,255,0.15);
  color:rgba(0,229,255,0.22);
}
.cell.flash {
  animation:cellFlash 0.7s ease forwards !important;
}
@keyframes cellFlash {
  0%   { background:var(--glow-y); color:#000; transform:scale(1.15); z-index:5; }
  40%  { background:var(--glow-g); color:#000; }
  100% { opacity:0; transform:scale(0.7); }
}
.cell.combo-flash {
  animation:comboFlash 0.7s ease forwards !important;
}
@keyframes comboFlash {
  0%   { background:var(--glow-p); color:#fff; transform:scale(1.2); z-index:5; }
  40%  { background:var(--glow-y); color:#000; }
  100% { opacity:0; transform:scale(0.7); }
}

/* ── OVERLAY ── */
#board-overlay {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(8,12,16,0.93); backdrop-filter:blur(6px);
  z-index:50; gap:14px; padding:28px 24px;
}
#board-overlay.hidden { display:none; }
.ov-title {
  font-family:'DotGothic16',monospace; font-size:22px;
  color:var(--glow-b); text-shadow:0 0 12px var(--glow-b);
  text-align:center; line-height:1.4;
}
.ov-sub { font-size:13px; color:var(--dim); text-align:center; line-height:1.9; }
.ov-words { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:320px; }
.ov-word {
  background:rgba(0,229,255,0.05); border:1px solid rgba(0,229,255,0.18);
  border-radius:8px; padding:6px 12px; text-align:center;
}
.ov-word .ow-kana { font-size:17px; font-weight:900; color:var(--glow-b); }
.ov-word .ow-sub  { font-size:10px; color:var(--dim); }

.btn {
  font-family:'DotGothic16',monospace; font-size:14px; letter-spacing:1px;
  background:var(--glow-b); color:#000;
  border:none; border-radius:8px; padding:12px 28px; cursor:pointer;
  box-shadow:0 0 20px rgba(0,229,255,0.4);
  width:100%; max-width:240px; transition:all 0.15s;
}
.btn:active { transform:scale(0.96); }
.btn.secondary {
  background:transparent; color:var(--dim);
  border:1px solid var(--border); box-shadow:none; font-size:12px; margin-top:-6px;
}

/* ── WORD POPUP ── */
#word-popup {
  position:absolute; left:50%; top:36%;
  transform:translate(-50%,-50%);
  background:rgba(8,12,16,0.96);
  border:2px solid var(--glow-y);
  border-radius:16px; padding:14px 22px;
  text-align:center; z-index:40; pointer-events:none;
  min-width:160px; display:none;
}
#word-popup.show { display:block; animation:popupIn 1.9s ease forwards; }
#word-popup.combo { border-color:var(--glow-p); }
.wp-emoji  { font-size:30px; display:block; }
.wp-kana   { font-family:'DotGothic16',monospace; font-size:26px; color:var(--glow-y); text-shadow:0 0 10px var(--glow-y); display:block; line-height:1.2; }
#word-popup.combo .wp-kana { color:var(--glow-p); text-shadow:0 0 10px var(--glow-p); }
.wp-romaji { font-size:11px; color:var(--glow-b); letter-spacing:2px; }
.wp-meaning{ font-size:13px; color:var(--text); margin:2px 0; }
.wp-pts    { font-family:'DotGothic16',monospace; font-size:17px; color:var(--glow-p); margin-top:5px; }

@keyframes popupIn {
  0%   { opacity:0; transform:translate(-50%,-62%) scale(0.7); }
  12%  { opacity:1; transform:translate(-50%,-68%) scale(1.05); }
  75%  { opacity:1; transform:translate(-50%,-68%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-74%) scale(0.9); }
}

/* ── COMBO BANNER ── */
#combo-banner {
  position:absolute; left:50%; top:10%;
  transform:translateX(-50%);
  font-family:'DotGothic16',monospace; font-size:26px;
  color:var(--glow-p); text-shadow:0 0 16px var(--glow-p);
  pointer-events:none; z-index:41; white-space:nowrap; display:none;
}
#combo-banner.show { display:block; animation:comboBannerAnim 1.5s ease forwards; }
@keyframes comboBannerAnim {
  0%   { opacity:0; transform:translateX(-50%) scale(0.8); }
  15%  { opacity:1; transform:translateX(-50%) scale(1.12); }
  70%  { opacity:1; transform:translateX(-50%) scale(1); }
  100% { opacity:0; }
}

/* ── WORD PANEL ── */
#word-panel {
  background:var(--surface);
  border-top:2px solid var(--border);
  flex-shrink:0;
  padding:7px 8px 8px;
  display:flex; flex-direction:column; gap:5px;
}
.word-row {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,0.025);
  border:1px solid var(--border);
  border-radius:8px; padding:6px 10px;
  animation:rowAppear 0.4s ease;
  position:relative; overflow:hidden;
}
@keyframes rowAppear {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:none; }
}
.word-row.boss { border-color:rgba(255,45,120,0.35); background:rgba(255,45,120,0.04); }
.wr-emoji { font-size:19px; flex-shrink:0; }
.wr-kana  { font-size:17px; font-weight:900; color:var(--text); }
.wr-sub   { font-size:9px; color:var(--dim); }
.wr-mult  {
  font-family:'DotGothic16',monospace; font-size:15px; font-weight:900;
  color:var(--glow-g); text-shadow:0 0 5px var(--glow-g);
  min-width:30px; text-align:right; flex-shrink:0;
  transition:transform 0.15s;
}
.word-row.boss .wr-mult { color:var(--glow-p); text-shadow:0 0 5px var(--glow-p); }
.wr-mult.bump { transform:scale(1.4); }

/* sweep flash */
.word-row::after {
  content:''; position:absolute; inset:0; opacity:0; pointer-events:none;
}
.word-row.bar-flash::after {
  background:linear-gradient(90deg,transparent,rgba(57,255,20,0.3),transparent);
  animation:barSweep 0.55s ease forwards;
}
.word-row.bar-combo::after {
  background:linear-gradient(90deg,transparent,rgba(255,45,120,0.4),transparent);
  animation:barSweep 0.55s ease forwards;
}
@keyframes barSweep {
  from { opacity:1; transform:translateX(-110%); }
  to   { opacity:0; transform:translateX(110%); }
}
</style>
</head>
<body>
<div id="shell">

  <div id="main-area">
    <div id="board-wrap">
      <div id="board"></div>
      <div id="word-popup">
        <span class="wp-emoji"></span>
        <span class="wp-kana"></span>
        <div class="wp-romaji"></div>
        <div class="wp-meaning"></div>
        <div class="wp-pts"></div>
      </div>
      <div id="combo-banner"></div>
      <div id="board-overlay">
        <div class="ov-title" id="ov-title">かなDROP</div>
        <div class="ov-sub"  id="ov-sub"></div>
        <div class="ov-words" id="ov-words"></div>
        <button class="btn" id="ov-btn">はじめる</button>
        <button class="btn secondary" id="ov-btn2" style="display:none">Recommencer</button>
      </div>
    </div>
    
    <div id="side-panel">
      <div id="title-logo">かな<br>DROP</div>
      <div id="next-block">
        <div id="next-label">NEXT</div>
        <div id="next-kana">？</div>
      </div>
      <div id="score-block">
        <div id="score-label">SCORE</div>
        <div id="score-val">0</div>
      </div>
    </div>
  </div>

  <div id="word-panel"></div>

</div>
<script>
// ═══════════════════════════════════════════════
//  WORD LIST  —  5 × 2-kana  +  1 boss × 3-kana
// ═══════════════════════════════════════════════
const LEVEL_WORDS = [
  {kana:'いぬ',  romaji:'inu',    meaning:'chien',  emoji:'🐕', boss:false},
  {kana:'ねこ',  romaji:'neko',   meaning:'chat',   emoji:'🐈', boss:false},
  {kana:'うし',  romaji:'ushi',   meaning:'vache',  emoji:'🐄', boss:false},
  {kana:'うま',  romaji:'uma',    meaning:'cheval', emoji:'🐎', boss:false},
  {kana:'くま',  romaji:'kuma',   meaning:'ours',   emoji:'🐻', boss:false},
  {kana:'ねずみ',romaji:'nezumi', meaning:'souris', emoji:'🐭', boss:true},
];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const COLS = 8;
let ROWS = 10;

let board = [];
let active = null;        // {char, x, y}
let nextChar = '';
let score = 0;

let activeWords  = [];    // words currently displayed in panel
let wordIntroIdx = 0;     // next index in LEVEL_WORDS to introduce
let foundRound   = new Set(); // kana found since last intro
let kanaPool     = [];

let gameRunning  = false;
let waitSpawn    = false;
let dropTimer    = null;
let DROP_SPEED   = 1400;

// touch
let txStart=0, tyStart=0, ttStart=0, lastTap=0;

// ═══════════════════════════════════════════════
//  BOARD SIZING
// ═══════════════════════════════════════════════
function calcRows() {
  const panH  = document.getElementById('word-panel').offsetHeight || 0;
  const avail = (window.innerHeight || document.documentElement.clientHeight) - panH - 4;
  // Largeur ajustée à board-wrap au lieu de window
  const boardWrapW = document.getElementById('board-wrap').offsetWidth || (window.innerWidth * 0.75);
  const cellW = Math.floor(boardWrapW / COLS);
  ROWS = Math.max(7, Math.floor(avail / cellW));
}

// ═══════════════════════════════════════════════
//  KANA POOL
// ═══════════════════════════════════════════════
function rebuildPool() {
  kanaPool = activeWords.flatMap(w => [...w.kana]);
}
function rndKana() {
  return kanaPool[Math.floor(Math.random() * kanaPool.length)];
}

// ═══════════════════════════════════════════════
//  BOARD DOM
// ═══════════════════════════════════════════════
function initBoard() {
  board = Array.from({length:ROWS}, () =>
    Array.from({length:COLS}, () => ({filled:false, char:''}))
  );
}
function buildDOM() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  el.style.gridTemplateRows = `repeat(${ROWS},1fr)`;
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const d = document.createElement('div');
    d.className = 'cell empty';
    d.dataset.r = r; d.dataset.c = c;
    el.appendChild(d);
  }
}
const gc = (r,c) => document.querySelector(`#board [data-r="${r}"][data-c="${c}"]`);

// ═══════════════════════════════════════════════
//  SPAWN / MOVE / LOCK
// ═══════════════════════════════════════════════
function spawn() {
  waitSpawn = false;
  active = {char: nextChar||rndKana(), x: Math.floor(COLS/2), y:0};
  nextChar = rndKana();
  document.getElementById('next-kana').textContent = nextChar;
  if (board[0][active.x].filled) { endGame(); return; }
  render();
  startTimer();
}
function ok(x,y) {
  return x>=0 && x<COLS && y<ROWS && !board[y][x].filled;
}
function startTimer() {
  clearInterval(dropTimer);
  dropTimer = setInterval(tick, DROP_SPEED);
}
function tick() {
  if (!gameRunning||waitSpawn||!active) return;
  ok(active.x, active.y+1) ? (active.y++, render()) : lock();
}
function lock() {
  if (!active) return;
  clearInterval(dropTimer);
  board[active.y][active.x] = {filled:true, char:active.char};
  const r=active.y, c=active.x;
  active=null; waitSpawn=true;
  render();
  checkWords(r,c);
}
function hardDrop() {
  if (!active||!gameRunning||waitSpawn) return;
  while (ok(active.x, active.y+1)) active.y++;
  render(); lock();
}

// ═══════════════════════════════════════════════
//  WORD DETECTION
// ═══════════════════════════════════════════════
function checkWords(pr, pc) {
  const found=[], seenK=new Set();

  function scan(cells) {
    const line = cells.map(({r,c})=>board[r][c].filled?board[r][c].char:'\x00').join('');
    activeWords.forEach(w => {
      if (seenK.has(w.kana)) return;
      let i = line.indexOf(w.kana);
      while (i!==-1) {
        seenK.add(w.kana);
        found.push({word:w, cells: Array.from({length:w.kana.length},(_,j)=>cells[i+j])});
        i = line.indexOf(w.kana, i+1);
      }
    });
  }

  // Scan horizontal ET vertical
  scan(Array.from({length:COLS},(_,c)=>({r:pr,c})));
  scan(Array.from({length:ROWS},(_,r)=>({r,c:pc})));

  if (!found.length) { spawn(); return; }

  const isCombo = found.length >= 2;
  const allCells = new Set();
  found.forEach(f=>{
    f.cells.forEach(cell=>allCells.add(`${cell.r},${cell.c}`));
    foundRound.add(f.word.kana);
    f.word.mult = (f.word.mult||1);
  });

  // Flash
  allCells.forEach(key=>{
    const [r,c]=key.split(',').map(Number);
    const el=gc(r,c);
    if(el) el.classList.add(isCombo?'combo-flash':'flash');
  });

  // Points
  let pts=0;
  found.forEach(f=>{ pts += f.word.kana.length*100*f.word.mult; f.word.mult++; });
  score+=pts; updateScore();

  showPopup(found[0].word, pts, isCombo);
  found.forEach(f=>flashBar(f.word.kana, isCombo));
  updateMults();

  setTimeout(()=>{
    allCells.forEach(key=>{
      const [r,c]=key.split(',').map(Number);
      board[r][c]={filled:false,char:''};
      const el=gc(r,c);
      if(el){el.className='cell empty';el.textContent='';}
    });
    gravity(); render();

    const allDone = activeWords.every(w=>foundRound.has(w.kana));
    if (allDone) {
      if (wordIntroIdx >= LEVEL_WORDS.length) { setTimeout(levelDone, 400); }
      else introNext();
    } else { spawn(); }
  }, 800);
}

function gravity() {
  for (let c=0;c<COLS;c++){
    const ch=[];
    for(let r=ROWS-1;r>=0;r--) if(board[r][c].filled) ch.push(board[r][c].char);
    for(let r=ROWS-1;r>=0;r--) board[r][c]=ch.length?{filled:true,char:ch.shift()}:{filled:false,char:''};
  }
}

// ═══════════════════════════════════════════════
//  WORD INTRO & SHIFT UP
// ═══════════════════════════════════════════════
function shiftBoardUp() {
  // Fait remonter tous les blocs d'une ligne
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS; c++) {
      board[r][c] = { ...board[r+1][c] };
    }
  }
  // Vide la dernière ligne
  for (let c = 0; c < COLS; c++) {
    board[ROWS-1][c] = {filled: false, char: ''};
  }
}

function introNext() {
  if (wordIntroIdx>=LEVEL_WORDS.length) return;
  const w=LEVEL_WORDS[wordIntroIdx++];
  w.mult=1;
  activeWords.push(w);
  foundRound=new Set(); // all words must be done again
  rebuildPool();
  window._isIntroducingWord = true; // Déclenche le shift up dans renderPanel
  renderPanel();
  setTimeout(()=>spawn(), 350);
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function ghostY() {
  if(!active) return -1;
  let g=active.y;
  while(g+1<ROWS&&!board[g+1][active.x].filled) g++;
  return g;
}
function render() {
  const gy=ghostY();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const el=gc(r,c);
    if(!el||el.classList.contains('flash')||el.classList.contains('combo-flash')) continue;
    if(active&&r===active.y&&c===active.x){el.className='cell active';el.textContent=active.char;}
    else if(active&&r===gy&&c===active.x&&gy!==active.y){el.className='cell ghost';el.textContent=active.char;}
    else if(board[r][c].filled){el.className='cell filled';el.textContent=board[r][c].char;}
    else{el.className='cell empty';el.textContent='';}
  }
}
function updateScore() {
  document.getElementById('score-val').textContent=score.toLocaleString();
}

// ═══════════════════════════════════════════════
//  WORD PANEL
// ═══════════════════════════════════════════════
function renderPanel() {
  const p=document.getElementById('word-panel');
  p.innerHTML='';
  activeWords.forEach(w=>{
    const row=document.createElement('div');
    row.className='word-row'+(w.boss?' boss':'');
    row.id='wr-'+w.kana;
    row.innerHTML=`
      <div class="wr-emoji">${w.emoji}</div>
      <div style="flex:1;min-width:0">
        <div class="wr-kana">${w.kana}</div>
        <div class="wr-sub">${w.romaji} · ${w.meaning}</div>
      </div>
      <div class="wr-mult" id="wm-${w.kana}">x${w.mult||1}</div>`;
    p.appendChild(row);
  });

  // Board must shrink/grow — recalc after paint
  requestAnimationFrame(()=>{
    const oldRows = ROWS;
    const oldBoard = JSON.parse(JSON.stringify(board)); // Copie de l'état
    
    calcRows();
    
    // On ne reconstruit le DOM que si la hauteur a changé ou si la grille est vide
    if (oldRows !== ROWS || board.length === 0) {
      buildDOM();
      initBoard();
      
      // Restauration intelligente des pièces (alignement par le bas)
      if (oldBoard.length > 0) {
        const rOffset = Math.max(0, oldRows - ROWS);
        for(let r=0; r<ROWS; r++){
          for(let c=0; c<COLS; c++){
             if (r + rOffset < oldRows) {
                 board[r][c] = oldBoard[r + rOffset][c] || {filled:false, char:''};
             }
          }
        }
      }
    }

    // Remonte la grille au lieu de l'effacer lors d'un nouveau mot
    if (window._isIntroducingWord) {
        shiftBoardUp();
        window._isIntroducingWord = false;
    }
    
    render();
  });
}

function updateMults() {
  activeWords.forEach(w=>{
    const el=document.getElementById('wm-'+w.kana);
    if(!el) return;
    el.textContent='x'+w.mult;
    el.classList.add('bump');
    setTimeout(()=>el.classList.remove('bump'),200);
  });
}
function flashBar(kana, isCombo) {
  const row=document.getElementById('wr-'+kana);
  if(!row) return;
  row.classList.remove('bar-flash','bar-combo');
  void row.offsetWidth;
  row.classList.add(isCombo?'bar-combo':'bar-flash');
  setTimeout(()=>row.classList.remove('bar-flash','bar-combo'),650);
}

// ═══════════════════════════════════════════════
//  POPUP
// ═══════════════════════════════════════════════
let popTimer=null;
function showPopup(word, pts, isCombo) {
  const p=document.getElementById('word-popup');
  p.querySelector('.wp-emoji').textContent=word.emoji;
  p.querySelector('.wp-kana').textContent=word.kana;
  p.querySelector('.wp-romaji').textContent=word.romaji;
  p.querySelector('.wp-meaning').textContent=word.meaning;
  p.querySelector('.wp-pts').textContent=(isCombo?'🔥 COMBO! ':'')+'+'+(pts)+' pts';
  p.className=isCombo?'combo show':'show';
  void p.offsetWidth;

  if (isCombo) {
    const b=document.getElementById('combo-banner');
    const maxMult=Math.max(...activeWords.map(w=>w.mult||1));
    b.textContent='🔥 COMBO x'+maxMult;
    b.className='show'; void b.offsetWidth;
    setTimeout(()=>b.className='',1600);
  }

  clearTimeout(popTimer);
  popTimer=setTimeout(()=>p.className='',1950);
}

// ═══════════════════════════════════════════════
//  OVERLAY
// ═══════════════════════════════════════════════
function showOverlay({title,sub,words=[],btn1,act1,btn2=null,act2=null}) {
  clearInterval(dropTimer); gameRunning=false;
  document.getElementById('ov-title').innerHTML=title;
  document.getElementById('ov-sub').innerHTML=sub;
  const ow=document.getElementById('ov-words');
  ow.innerHTML='';
  words.forEach(w=>{
    const d=document.createElement('div'); d.className='ov-word';
    d.innerHTML=`<div class="ow-kana">${w.emoji} ${w.kana}</div><div class="ow-sub">${w.romaji} · ${w.meaning}</div>`;
    ow.appendChild(d);
  });
  const b1=document.getElementById('ov-btn');
  b1.textContent=btn1; b1.onclick=act1;
  const b2=document.getElementById('ov-btn2');
  if(btn2){b2.textContent=btn2;b2.onclick=act2;b2.style.display='';}
  else b2.style.display='none';
  document.getElementById('board-overlay').classList.remove('hidden');
}
function hideOverlay() {
  document.getElementById('board-overlay').classList.add('hidden');
}

// ═══════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════
function startGame() {
  score=0; updateScore();
  activeWords=[]; wordIntroIdx=0; foundRound=new Set();
  LEVEL_WORDS.forEach(w=>w.mult=1);
  document.getElementById('word-panel').innerHTML='';

  calcRows(); buildDOM(); initBoard();
  hideOverlay();
  gameRunning=true; waitSpawn=false;

  // Introduce word 1
  const w=LEVEL_WORDS[wordIntroIdx++];
  w.mult=1; activeWords.push(w);
  rebuildPool(); renderPanel();

  nextChar=rndKana();
  document.getElementById('next-kana').textContent=nextChar;
  setTimeout(()=>spawn(), 500);
}

function endGame() {
  clearInterval(dropTimer); gameRunning=false;
  showOverlay({
    title:'ゲームオーバー',
    sub:`Score : <strong style="color:var(--glow-y)">${score.toLocaleString()}</strong>`,
    btn1:'Réessayer', act1:startGame
  });
}

function levelDone() {
  clearInterval(dropTimer); gameRunning=false;
  showOverlay({
    title:'🎉 クリア！<br><small style="font-size:14px;color:var(--dim)">Niveau 1 terminé !</small>',
    sub:`Score : <strong style="color:var(--glow-y)">${score.toLocaleString()}</strong><br>Tu connais les animaux en japonais !`,
    words:LEVEL_WORDS,
    btn1:'Rejouer', act1:startGame
  });
}

// ═══════════════════════════════════════════════
//  TOUCH
// ═══════════════════════════════════════════════
const BW=document.getElementById('board-wrap');

BW.addEventListener('touchstart', e=>{
  const t=e.touches[0];
  txStart=t.clientX; tyStart=t.clientY; ttStart=Date.now();
  // double-tap
  const now=Date.now();
  if(now-lastTap<280){ if(gameRunning&&!waitSpawn&&active) hardDrop(); lastTap=0; return; }
  lastTap=now;
},{passive:true});

BW.addEventListener('touchend', e=>{
  if(!gameRunning||waitSpawn||!active) return;
  const t=e.changedTouches[0];
  const dx=t.clientX-txStart, dy=t.clientY-tyStart, dt=Date.now()-ttStart;
  const adx=Math.abs(dx), ady=Math.abs(dy);
  if(dt<200&&adx<12&&ady<12) return; // handled by double-tap
  if(ady>adx&&dy>50){ hardDrop(); return; } // swipe down
  if(adx>ady&&adx>10){
    const cellW=Math.floor(BW.offsetWidth/COLS);
    const steps=Math.max(1,Math.round(adx/cellW));
    const dir=dx>0?1:-1;
    for(let i=0;i<steps;i++){
      if(ok(active.x+dir,active.y)) active.x+=dir; else break;
    }
    render();
  }
},{passive:true});

// keyboard (desktop)
document.addEventListener('keydown',e=>{
  if(!gameRunning||waitSpawn||!active) return;
  if(e.key==='ArrowLeft'&&ok(active.x-1,active.y)){e.preventDefault();active.x--;render();}
  if(e.key==='ArrowRight'&&ok(active.x+1,active.y)){e.preventDefault();active.x++;render();}
  if(e.key==='ArrowDown'){e.preventDefault(); ok(active.x,active.y+1)?(active.y++,render()):lock();}
  if(e.key===' '){e.preventDefault();hardDrop();}
});

window.addEventListener('resize',()=>{
  if(!gameRunning) return;
  calcRows(); buildDOM(); initBoard(); if(active) render();
});

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
calcRows(); buildDOM();
showOverlay({
  title:'かなDROP',
  sub:`Fais tomber les hiraganas pour former des mots<br>
       <strong style="color:var(--glow-b)">horizontalement ou verticalement</strong><br><br>
       ← Glisse gauche/droite →<br>
       Double-tap · Swipe ↓ = chute<br><br>
       <span style="color:var(--glow-y)">Niveau 1 · Les animaux</span>`,
  words:LEVEL_WORDS.slice(0,3),
  btn1:'はじめる — Jouer', act1:startGame
});
</script>
