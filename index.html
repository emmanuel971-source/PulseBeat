<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPM Detector SUPER PRO</title>

<style>
body { background:#0a0a0f; color:#fff; font-family:monospace; padding:20px; }
h1 { font-size:48px; margin:10px 0; }

.meter { width:100%; height:12px; background:#222; position:relative; }
.fill { height:100%; width:0%; background:linear-gradient(90deg,#47ffe8,#e8ff47,#ff4747); }
.threshold { position:absolute; top:0; width:2px; height:100%; background:red; }

canvas { width:100%; height:80px; background:#111; margin-top:10px; }

.controls label { display:block; font-size:12px; margin-top:6px; }
button { padding:10px; margin-top:10px; }

.state { font-size:12px; color:#888; margin-top:5px; }
.lock { color:#47ff8a; }
</style>
</head>

<body>

<h2>BPM Detector — SUPER PRO</h2>

<div class="meter">
  <div class="fill" id="meter"></div>
  <div class="threshold" id="threshold"></div>
</div>

<div id="db">-∞ dB</div>

<canvas id="wave"></canvas>

<h1 id="bpm">--</h1>
<div class="state" id="state">silence</div>

<button onclick="toggle()">START / STOP</button>

<div class="controls">
  <label>Sensibilité <input type="range" id="sens" min="1.2" max="3" step="0.1" value="1.8"></label>
  <label>Lissage <input type="range" id="smooth" min="0.5" max="0.95" step="0.01" value="0.75"></label>
</div>

<script>

// ======================
// AUDIO
// ======================

let ctx, analyser, src, stream;
let running=false;

// ======================
// STATE
// ======================

let energyHistory=[];
let onsetHistory=[];
let beatTimes=[];

let lastBeat=0;
let lastOnsetTime=0;

let smoothedBpm=null;

// ======================
// PARAMS
// ======================

let SENS=1.8;
let SMOOTH=0.75;
const BPM_TIMEOUT = 2000;

// ======================
// UI
// ======================

const meter = document.getElementById("meter");
const thresholdEl = document.getElementById("threshold");
const bpmEl = document.getElementById("bpm");
const dbEl = document.getElementById("db");
const stateEl = document.getElementById("state");

const canvas = document.getElementById("wave");
const cctx = canvas.getContext("2d");

sens.oninput = e=>SENS=+e.target.value;
smooth.oninput = e=>SMOOTH=+e.target.value;

// ======================
// START / STOP
// ======================

async function toggle(){

  if(running){
    stream.getTracks().forEach(t=>t.stop());
    ctx.close();
    running=false;
    return;
  }

  ctx = new AudioContext();

  stream = await navigator.mediaDevices.getUserMedia({
    audio:{
      echoCancellation:false,
      noiseSuppression:false,
      autoGainControl:false
    }
  });

  src = ctx.createMediaStreamSource(stream);

  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;

  src.connect(analyser);

  running=true;
  loop();
}

// ======================
// LOOP
// ======================

function loop(){
  if(!running) return;
  requestAnimationFrame(loop);

  const buffer = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buffer);

  // ========= ENERGY =========

  let sum=0;
  for(let i=0;i<buffer.length;i++){
    sum += buffer[i]*buffer[i];
  }

  let energy = Math.sqrt(sum / buffer.length);

  // smoothing audio
  if(energyHistory.length>0){
    energy = SMOOTH*energyHistory.at(-1) + (1-SMOOTH)*energy;
  }

  energyHistory.push(energy);
  if(energyHistory.length>200) energyHistory.shift();

  // ========= DB + VU =========

  let db = 20*Math.log10(energy);
  dbEl.textContent = isFinite(db)? db.toFixed(1)+" dB":"-∞";

  let norm = (db+60)/60;
  norm = Math.pow(norm,2);
  norm = Math.max(0,Math.min(1,norm));
  meter.style.width = (norm*100)+"%";

  // ========= ONSET =========

  let diff = energy - (energyHistory.at(-2) || energy);

  onsetHistory.push(diff);
  if(onsetHistory.length>50) onsetHistory.shift();

  const mean = avg(onsetHistory);
  const std = stddev(onsetHistory, mean);
  const threshold = mean + SENS*std;

  // seuil visuel
  let thrNorm = threshold*5;
  thrNorm = Math.max(0,Math.min(1,thrNorm));
  thresholdEl.style.left = (thrNorm*100)+"%";

  const now = performance.now();

  if(diff > threshold && now-lastBeat>180){

    lastBeat = now;
    lastOnsetTime = now;

    // flash visuel
    meter.style.background="lime";
    setTimeout(()=>meter.style.background="",60);

    // BPM instantané
    if(beatTimes.length>=1){
      const interval = now - beatTimes.at(-1);
      const instantBpm = 60000 / interval;

      if(instantBpm>40 && instantBpm<220){
        bpmEl.textContent = Math.round(instantBpm);
      }
    }

    beatTimes.push(now);
    if(beatTimes.length>20) beatTimes.shift();

    computeBPM();
  }

  // ========= TIMEOUT =========

  if(now - lastOnsetTime > BPM_TIMEOUT){
    bpmEl.textContent="--";
    stateEl.textContent="silence";
    beatTimes=[];
    smoothedBpm=null;
  }

  draw(buffer);
}

// ======================
// BPM STABLE
// ======================

function computeBPM(){

  if(beatTimes.length<6) return;

  let intervals=[];
  for(let i=1;i<beatTimes.length;i++){
    intervals.push(beatTimes[i]-beatTimes[i-1]);
  }

  const avgInt = avg(intervals);
  const bpm = 60000 / avgInt;

  if(bpm<40 || bpm>220) return;

  if(smoothedBpm===null){
    smoothedBpm=bpm;
  } else {
    smoothedBpm = 0.7*smoothedBpm + 0.3*bpm;
  }

  bpmEl.textContent = Math.round(smoothedBpm);

  // état
  const stability = stddev(intervals, avgInt)/avgInt;

  if(stability < 0.1){
    stateEl.textContent="LOCKED";
    stateEl.className="state lock";
  } else {
    stateEl.textContent="tracking";
    stateEl.className="state";
  }
}

// ======================
// DRAW
// ======================

function draw(buffer){
  const w = canvas.width = canvas.offsetWidth;
  const h = canvas.height = canvas.offsetHeight;

  cctx.clearRect(0,0,w,h);
  cctx.beginPath();

  for(let i=0;i<buffer.length;i++){
    const x=(i/buffer.length)*w;
    const y=(buffer[i]*0.5+0.5)*h;
    i===0?cctx.moveTo(x,y):cctx.lineTo(x,y);
  }

  cctx.strokeStyle="#47ffe8";
  cctx.stroke();
}

// ======================
// MATH
// ======================

function avg(a){ return a.reduce((x,y)=>x+y,0)/a.length; }
function stddev(a,m){
  return Math.sqrt(a.reduce((s,v)=>s+(v-m)*(v-m),0)/a.length);
}

</script>

</body>
</html>
