<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>BPM Detector</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --accent: #e8ff47;
    --accent2: #47ffe8;
    --text: #f0f0f5;
    --muted: #5a5a72;
    --danger: #ff4747;
    --green: #47ff8a;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 2rem 1.5rem 3rem;
    min-height: 100dvh;
  }

  /* ── Header ── */
  header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse-dot 1s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* ── BPM ring ── */
  .bpm-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    position: relative;
  }

  .bpm-ring {
    width: 220px; height: 220px;
    border-radius: 50%;
    border: 1.5px solid var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: border-color 0.4s;
  }
  .bpm-ring.listening {
    border-color: var(--muted);
  }
  .bpm-ring.locked {
    border-color: var(--accent);
    box-shadow: 0 0 0 0 rgba(232,255,71,0.4);
    animation: ring-breathe 1.5s ease-in-out infinite;
  }
  @keyframes ring-breathe {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,255,71,0.2); }
    50% { box-shadow: 0 0 0 18px rgba(232,255,71,0); }
  }
  .bpm-ring.beat-flash {
    animation: ring-beat 0.12s ease-out !important;
  }
  @keyframes ring-beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  .bpm-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .bpm-value {
    font-size: 80px;
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -2px;
    transition: color 0.2s;
    font-variant-numeric: tabular-nums;
  }
  .bpm-value.no-signal { color: var(--muted); }
  .bpm-label {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* SVG ring progress */
  .ring-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: rotate(-90deg);
    pointer-events: none;
  }
  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 660;
    stroke-dashoffset: 660;
    transition: stroke-dashoffset 0.1s linear;
    opacity: 0.3;
  }

  /* ── Phase indicator ── */
  .phase-row {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 28px;
  }
  .beat-led {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--muted);
    transition: background 0.05s, box-shadow 0.05s;
    flex-shrink: 0;
  }
  .beat-led.flash {
    background: var(--accent2);
    box-shadow: 0 0 10px var(--accent2);
  }
  .phase-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    transition: color 0.3s;
  }
  .phase-label.listening { color: var(--muted); }
  .phase-label.locked    { color: var(--green); }

  /* ── Confidence bar ── */
  .confidence-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .conf-header {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .conf-bar-bg {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .conf-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease, background 0.4s;
  }

  /* ── Level meter ── */
  .level-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .level-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .level-meter-bg {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .level-meter-fill {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent2) 0%, var(--accent) 60%, var(--danger) 100%);
    transition: width 0.05s linear;
  }
  .level-db {
    font-size: 10px;
    color: var(--muted);
    min-width: 36px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── Waveform ── */
  .waveform-wrap { width: 100%; position: relative; }
  canvas#waveform {
    width: 100%; height: 72px;
    display: block;
    border-radius: 8px;
  }

  /* ── Beat history dots ── */
  .beat-history {
    display: flex;
    gap: 6px;
    justify-content: center;
    align-items: center;
    height: 20px;
  }
  .beat-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--surface2);
    transition: background 0.1s, transform 0.1s;
  }
  .beat-dot.recent {
    background: var(--accent);
    transform: scale(1.4);
  }
  .beat-dot.old { background: var(--muted); }

  /* ── Stats row ── */
  .stats-row {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--surface2);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: -0.5px;
  }
  .stat-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── Buttons ── */
  .btn-start {
    width: 100%;
    padding: 18px;
    border: 1.5px solid var(--accent);
    border-radius: var(--radius);
    background: transparent;
    color: var(--accent);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.1s;
    -webkit-appearance: none;
  }
  .btn-start:active { transform: scale(0.98); }
  .btn-start.running {
    background: rgba(232,255,71,0.08);
    border-color: var(--danger);
    color: var(--danger);
  }
  .btn-reset {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .btn-reset:active { color: var(--text); }

  .bottom-row {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bottom-actions {
    display: flex;
    justify-content: center;
  }
</style>
</head>
<body>

<header>
  <span class="logo">BPM Detector</span>
  <div class="status-dot" id="statusDot"></div>
</header>

<div class="bpm-container">
  <div class="bpm-ring" id="bpmRing">
    <svg class="ring-svg" viewBox="0 0 220 220">
      <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="105"/>
    </svg>
    <div class="bpm-inner">
      <div class="bpm-value no-signal" id="bpmValue">--</div>
      <div class="bpm-label">BPM</div>
    </div>
  </div>
</div>

<!-- Phase indicator: LED + label -->
<div class="phase-row">
  <div class="beat-led" id="beatLed"></div>
  <span class="phase-label" id="phaseLabel">En attente</span>
</div>

<div class="beat-history" id="beatHistory"></div>

<div style="width:100%;display:flex;flex-direction:column;gap:10px;">
  <div class="confidence-wrap">
    <div class="conf-header">
      <span>Stabilité</span>
      <span id="confValue">0%</span>
    </div>
    <div class="conf-bar-bg">
      <div class="conf-bar-fill" id="confBar"></div>
    </div>
  </div>

  <div class="level-row">
    <span class="level-label">Niveau</span>
    <div class="level-meter-bg">
      <div class="level-meter-fill" id="levelMeter"></div>
    </div>
    <span class="level-db" id="levelDb">-∞</span>
  </div>

  <div class="waveform-wrap">
    <canvas id="waveform"></canvas>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-value" id="statMin">--</div>
    <div class="stat-label">Min</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="statBeats">0</div>
    <div class="stat-label">Beats</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="statMax">--</div>
    <div class="stat-label">Max</div>
  </div>
</div>

<div class="bottom-row">
  <button class="btn-start" id="btnStart" onclick="toggleDetection()">▶ &nbsp; Démarrer</button>
  <div class="bottom-actions">
    <button class="btn-reset" onclick="resetAll()">↺ &nbsp; Reset</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════

const FFT_SIZE        = 2048;
const FRAME_MS        = 1000 / 30;        // ~30 fps
const ANALYSER_SMOOTH = 0.3;              // FFT smoothing (was 0.0 — wrong)

// Silence gate: below this RMS level, no beat detection at all
// -50 dBFS is loud enough to ignore mic noise but catch quiet acoustic guitar
const SILENCE_GATE_DB = -50;

// Min interval between two beats (250ms = 240 BPM max)
const MIN_BEAT_INTERVAL_MS = 250;

// Flux history window per band (~1.4s at 30fps)
const FLUX_HISTORY_SIZE = 43;

// How many beats we keep to compute tempo
const BEAT_BUFFER_SIZE = 16;

// Lock requires this many beats with CV below threshold
const LOCK_MIN_BEATS = 8;
const LOCK_CV_THRESHOLD = 0.12;   // 12% coefficient of variation

// Unlock if 3 consecutive intervals are far off from locked BPM
const UNLOCK_OUTLIER_COUNT = 3;
const UNLOCK_OUTLIER_RATIO = 0.20; // >20% deviation from locked BPM

// BPM smoothing (low alpha = sluggish but stable)
const BPM_ALPHA_LOCKED   = 0.08;
const BPM_ALPHA_SEEKING  = 0.20;

// Beat dots UI
const BEAT_DOTS = 16;

// ═══════════════════════════════════════════════════════════════
// FREQUENCY BANDS  (3 bands, all contribute to beat detection)
// ═══════════════════════════════════════════════════════════════
//   Low  : kick, bass guitar
//   Mid  : snare, guitar body, voice
//   High : clap, hi-hat, guitar attack
const BANDS = [
  { name: 'low',  fLo:  60, fHi:  200, weight: 1.2 },
  { name: 'mid',  fLo: 200, fHi: 2000, weight: 0.9 },
  { name: 'high', fLo:2000, fHi: 8000, weight: 0.7 },
];

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let audioCtx   = null;
let analyser   = null;
let stream     = null;
let rafId      = null;
let running    = false;
let lastFrameTime = 0;

// Per-band state
let bandState = BANDS.map(() => ({
  prevBins: null,        // Float32Array, previous frame magnitudes
  fluxHistory: [],       // recent flux values for adaptive threshold
}));

// Beat timestamps (ms, performance.now())
let beatTimestamps = [];
let lastBeatTime   = 0;
let beatCount      = 0;

// BPM state
let bpmSmoothed  = null;   // null = not yet computed
let bpmLocked    = false;  // false = LISTENING, true = LOCKED
let outlierStreak = 0;     // consecutive out-of-tempo beats

// Stats
let bpmMin = Infinity;
let bpmMax = -Infinity;

// Beat dot UI state
let beatDotsState = new Array(BEAT_DOTS).fill(0);

// Waveform canvas
const wfCanvas = document.getElementById('waveform');
const wfCtx    = wfCanvas.getContext('2d');

// ═══════════════════════════════════════════════════════════════
// UI REFS
// ═══════════════════════════════════════════════════════════════
const bpmValueEl   = document.getElementById('bpmValue');
const bpmRingEl    = document.getElementById('bpmRing');
const ringProgressEl = document.getElementById('ringProgress');
const statusDotEl  = document.getElementById('statusDot');
const confBarEl    = document.getElementById('confBar');
const confValueEl  = document.getElementById('confValue');
const levelMeterEl = document.getElementById('levelMeter');
const levelDbEl    = document.getElementById('levelDb');
const statMinEl    = document.getElementById('statMin');
const statMaxEl    = document.getElementById('statMax');
const statBeatsEl  = document.getElementById('statBeats');
const beatHistoryEl= document.getElementById('beatHistory');
const beatLedEl    = document.getElementById('beatLed');
const phaseLabelEl = document.getElementById('phaseLabel');
const btnStart     = document.getElementById('btnStart');

// Init beat dots
for (let i = 0; i < BEAT_DOTS; i++) {
  const d = document.createElement('div');
  d.className = 'beat-dot';
  beatHistoryEl.appendChild(d);
}

// ═══════════════════════════════════════════════════════════════
// START / STOP
// ═══════════════════════════════════════════════════════════════
async function toggleDetection() {
  if (running) { stopDetection(); return; }
  try { await startDetection(); }
  catch(e) { alert('Accès micro refusé ou non disponible.\n' + e.message); }
}

async function startDetection() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false,
      sampleRate: 44100
    }
  });

  const source = audioCtx.createMediaStreamSource(stream);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize              = FFT_SIZE;
  analyser.smoothingTimeConstant = ANALYSER_SMOOTH; // 0.3, not 0.0

  source.connect(analyser);
  // NOTE: no DynamicsCompressor — it was amplifying noise and fighting us

  running = true;
  btnStart.textContent = '■  Arrêter';
  btnStart.classList.add('running');
  statusDotEl.classList.add('active');

  resetDetectionState();
  requestWakeLock();
  loop();
}

function stopDetection() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  audioCtx = analyser = stream = null;

  btnStart.textContent = '▶  Démarrer';
  btnStart.classList.remove('running');
  statusDotEl.classList.remove('active');
  bpmRingEl.classList.remove('listening', 'locked');
  levelMeterEl.style.width = '0%';
  levelDbEl.textContent = '-∞';
  phaseLabelEl.textContent = 'En attente';
  phaseLabelEl.className = 'phase-label';
  clearWaveform();
}

// ═══════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════
function loop(ts = 0) {
  if (!running) return;
  rafId = requestAnimationFrame(loop);
  if (ts - lastFrameTime < FRAME_MS) return;
  lastFrameTime = ts;

  const bufLen  = analyser.frequencyBinCount; // FFT_SIZE/2 = 1024
  const freqData = new Float32Array(bufLen);
  analyser.getFloatFrequencyData(freqData);

  const sr    = audioCtx.sampleRate || 44100;
  const binHz = sr / FFT_SIZE;

  // ── 1. Level meter (full-spectrum RMS)
  let rmsSum = 0;
  for (let i = 0; i < bufLen; i++) {
    const lin = Math.pow(10, freqData[i] / 20);
    rmsSum += lin * lin;
  }
  const rmsDb   = 10 * Math.log10(rmsSum / bufLen);
  const levelPct = Math.max(0, Math.min(100, (rmsDb + 80) / 80 * 100));
  levelMeterEl.style.width  = levelPct.toFixed(1) + '%';
  levelDbEl.textContent     = isFinite(rmsDb) ? rmsDb.toFixed(0) + ' dB' : '-∞';

  // ── 2. Waveform
  const timeData = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(timeData);
  drawWaveform(timeData);

  // ── 3. Silence gate — skip detection if too quiet
  if (!isFinite(rmsDb) || rmsDb < SILENCE_GATE_DB) {
    return;
  }

  // ── 4. Multi-band spectral flux — weighted sum
  let combinedFlux = 0;
  let combinedThreshold = 0;

  BANDS.forEach((band, bi) => {
    const state = bandState[bi];

    const bLo = Math.max(0, Math.floor(band.fLo / binHz));
    const bHi = Math.min(bufLen - 1, Math.floor(band.fHi / binHz));
    const nBins = bHi - bLo + 1;

    // Init prevBins on first frame
    if (!state.prevBins) {
      state.prevBins = new Float32Array(bufLen).fill(-Infinity);
    }

    // Compute half-wave rectified spectral flux for this band
    let flux = 0;
    for (let i = bLo; i <= bHi; i++) {
      const cur  = Math.pow(10, freqData[i] / 20);
      const prev = Math.pow(10, state.prevBins[i] / 20);
      const diff = cur - prev;
      if (diff > 0) flux += diff;
      state.prevBins[i] = freqData[i];
    }
    // Normalize by number of bins so bands are comparable
    flux /= nBins;

    // Adaptive threshold for this band
    state.fluxHistory.push(flux);
    if (state.fluxHistory.length > FLUX_HISTORY_SIZE) state.fluxHistory.shift();

    const mean = avg(state.fluxHistory);
    const std  = stddev(state.fluxHistory, mean);
    const thr  = mean + 1.5 * std;

    // Weighted contribution
    combinedFlux      += flux * band.weight;
    combinedThreshold += thr  * band.weight;
  });

  // ── 5. Peak detection
  const now = performance.now();
  const timeSinceLast = now - lastBeatTime;

  if (
    combinedFlux > combinedThreshold &&
    combinedFlux > 0 &&           // extra guard vs. zero-noise floor
    timeSinceLast > MIN_BEAT_INTERVAL_MS
  ) {
    lastBeatTime = now;
    onBeat(now);
  }

  // ── 6. Ring progress (visual metronome, only when locked)
  if (bpmLocked && bpmSmoothed && beatTimestamps.length >= 2) {
    const interval = 60000 / bpmSmoothed;
    const phase    = ((now - lastBeatTime) / interval) % 1;
    const circ     = 2 * Math.PI * 105;
    ringProgressEl.style.strokeDashoffset = (circ * (1 - phase)).toFixed(1);
  }
}

// ═══════════════════════════════════════════════════════════════
// BEAT HANDLER
// ═══════════════════════════════════════════════════════════════
function onBeat(ts) {
  beatCount++;
  statBeatsEl.textContent = beatCount;

  beatTimestamps.push(ts);
  if (beatTimestamps.length > BEAT_BUFFER_SIZE) beatTimestamps.shift();

  // Always flash the LED — immediate visual feedback of every detected beat
  flashLed();
  triggerBeatFlash();
  updateBeatDots();

  // Need at least 4 beats before computing anything
  if (beatTimestamps.length < 4) return;

  // Compute all inter-beat intervals
  const intervals = [];
  for (let i = 1; i < beatTimestamps.length; i++) {
    intervals.push(beatTimestamps[i] - beatTimestamps[i - 1]);
  }

  // Median filtering: keep only intervals within [0.5×, 2×] of the median
  const sorted = [...intervals].sort((a, b) => a - b);
  const med    = sorted[Math.floor(sorted.length / 2)];
  const filtered = intervals.filter(v => v > med * 0.5 && v < med * 2.0);

  if (filtered.length < 3) return;

  const meanInterval = avg(filtered);
  const cv           = stddev(filtered, meanInterval) / meanInterval; // coefficient of variation
  const rawBpm       = 60000 / meanInterval;

  // Clamp to musical range
  if (rawBpm < 50 || rawBpm > 220) return;

  // ── Unlock check: if we're locked and this beat is way off
  if (bpmLocked && bpmSmoothed !== null) {
    const deviation = Math.abs(rawBpm - bpmSmoothed) / bpmSmoothed;
    if (deviation > UNLOCK_OUTLIER_RATIO) {
      outlierStreak++;
      if (outlierStreak >= UNLOCK_OUTLIER_COUNT) {
        // Lost the beat — drop back to listening
        setLocked(false);
      }
      return; // don't update BPM on outlier beats
    } else {
      outlierStreak = 0;
    }
  }

  // ── Smooth BPM
  const alpha = bpmLocked ? BPM_ALPHA_LOCKED : BPM_ALPHA_SEEKING;
  if (bpmSmoothed === null) {
    bpmSmoothed = rawBpm;
  } else {
    bpmSmoothed = alpha * rawBpm + (1 - alpha) * bpmSmoothed;
  }

  // ── Lock check
  if (!bpmLocked && beatTimestamps.length >= LOCK_MIN_BEATS && cv < LOCK_CV_THRESHOLD) {
    setLocked(true);
  }

  // ── Update confidence bar (based on CV)
  // CV=0 → 100%, CV=LOCK_CV_THRESHOLD → ~50%, CV>0.3 → 0%
  const stability = Math.max(0, Math.min(1, 1 - cv / 0.3));
  const stabPct   = Math.round(stability * 100);
  confBarEl.style.width  = stabPct + '%';
  confBarEl.style.background =
    stabPct > 70 ? 'var(--accent)' :
    stabPct > 40 ? '#ffaa00' : '#ff6644';
  confValueEl.textContent = stabPct + '%';

  // ── Display BPM only when locked
  if (bpmLocked) {
    const display = Math.round(bpmSmoothed);
    bpmValueEl.textContent = display;
    bpmValueEl.classList.remove('no-signal');

    if (display < bpmMin) { bpmMin = display; statMinEl.textContent = bpmMin; }
    if (display > bpmMax) { bpmMax = display; statMaxEl.textContent = bpmMax; }
  }
}

// ═══════════════════════════════════════════════════════════════
// LOCK / UNLOCK
// ═══════════════════════════════════════════════════════════════
function setLocked(locked) {
  bpmLocked     = locked;
  outlierStreak = 0;

  bpmRingEl.classList.toggle('listening', !locked);
  bpmRingEl.classList.toggle('locked',    locked);

  if (locked) {
    phaseLabelEl.textContent = 'Tempo verrouillé';
    phaseLabelEl.className   = 'phase-label locked';
  } else {
    phaseLabelEl.textContent = 'Analyse…';
    phaseLabelEl.className   = 'phase-label listening';
    // Hide BPM display when we lose lock
    bpmValueEl.textContent = '--';
    bpmValueEl.classList.add('no-signal');
    ringProgressEl.style.strokeDashoffset = '660';
  }
}

// ═══════════════════════════════════════════════════════════════
// VISUAL FEEDBACK
// ═══════════════════════════════════════════════════════════════
let ledTimer = null;
function flashLed() {
  beatLedEl.classList.add('flash');
  if (ledTimer) clearTimeout(ledTimer);
  ledTimer = setTimeout(() => beatLedEl.classList.remove('flash'), 80);
}

function triggerBeatFlash() {
  bpmRingEl.classList.remove('beat-flash');
  void bpmRingEl.offsetWidth;
  bpmRingEl.classList.add('beat-flash');
  setTimeout(() => bpmRingEl.classList.remove('beat-flash'), 150);
}

function updateBeatDots() {
  beatDotsState.shift();
  beatDotsState.push(1);
  setTimeout(() => {
    if (beatDotsState[beatDotsState.length - 1] === 1) {
      beatDotsState[beatDotsState.length - 1] = 2;
      renderDots();
    }
  }, 300);
  renderDots();
}

function renderDots() {
  const dots = beatHistoryEl.children;
  for (let i = 0; i < BEAT_DOTS; i++) {
    dots[i].className = 'beat-dot';
    if      (beatDotsState[i] === 1) dots[i].classList.add('recent');
    else if (beatDotsState[i] === 2) dots[i].classList.add('old');
  }
}

// ═══════════════════════════════════════════════════════════════
// WAVEFORM
// ═══════════════════════════════════════════════════════════════
function drawWaveform(data) {
  const dpr = window.devicePixelRatio || 1;
  const w = wfCanvas.offsetWidth;
  const h = wfCanvas.offsetHeight;
  if (wfCanvas.width !== w * dpr || wfCanvas.height !== h * dpr) {
    wfCanvas.width  = w * dpr;
    wfCanvas.height = h * dpr;
    wfCtx.scale(dpr, dpr);
  }
  wfCtx.clearRect(0, 0, w, h);
  wfCtx.fillStyle = '#12121a';
  wfCtx.fillRect(0, 0, w, h);

  wfCtx.strokeStyle = '#1a1a26';
  wfCtx.lineWidth   = 1;
  wfCtx.beginPath();
  wfCtx.moveTo(0, h / 2); wfCtx.lineTo(w, h / 2);
  wfCtx.stroke();

  wfCtx.strokeStyle = '#47ffe8';
  wfCtx.lineWidth   = 1.5;
  wfCtx.beginPath();
  const sliceW = w / data.length;
  for (let i = 0; i < data.length; i++) {
    const v = (data[i] / 128.0) - 1;
    const y = v * h / 2 + h / 2;
    i === 0 ? wfCtx.moveTo(0, y) : wfCtx.lineTo(i * sliceW, y);
  }
  wfCtx.stroke();
}

function clearWaveform() {
  const w = wfCanvas.offsetWidth || wfCanvas.width;
  const h = wfCanvas.offsetHeight || wfCanvas.height;
  wfCtx.fillStyle = '#12121a';
  wfCtx.fillRect(0, 0, w, h);
}

// ═══════════════════════════════════════════════════════════════
// RESET
// ═══════════════════════════════════════════════════════════════
function resetDetectionState() {
  bandState = BANDS.map(() => ({ prevBins: null, fluxHistory: [] }));
  beatTimestamps = [];
  bpmSmoothed    = null;
  bpmLocked      = false;
  outlierStreak  = 0;
  lastBeatTime   = 0;
  beatDotsState.fill(0);
  renderDots();
  ringProgressEl.style.strokeDashoffset = '660';
  bpmRingEl.classList.remove('listening', 'locked');
  phaseLabelEl.textContent = 'Analyse…';
  phaseLabelEl.className   = 'phase-label listening';
}

function resetAll() {
  beatCount = 0;
  bpmMin    = Infinity;
  bpmMax    = -Infinity;
  statBeatsEl.textContent = '0';
  statMinEl.textContent   = '--';
  statMaxEl.textContent   = '--';
  bpmValueEl.textContent  = '--';
  bpmValueEl.classList.add('no-signal');
  confBarEl.style.width   = '0%';
  confValueEl.textContent = '0%';
  resetDetectionState();
}

// ═══════════════════════════════════════════════════════════════
// MATH HELPERS
// ═══════════════════════════════════════════════════════════════
function avg(arr) {
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}
function stddev(arr, mean) {
  const m = mean !== undefined ? mean : avg(arr);
  return Math.sqrt(arr.reduce((s, v) => s + (v - m) ** 2, 0) / arr.length);
}

// ═══════════════════════════════════════════════════════════════
// WAKE LOCK
// ═══════════════════════════════════════════════════════════════
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
});

// Init
clearWaveform();
</script>
