<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPM Detector Pro</title>

<style>
body {
  background:#0a0a0f;
  color:#fff;
  font-family:monospace;
  padding:20px;
}

h1 { font-size:50px; }

.meter {
  width:100%;
  height:12px;
  background:#222;
  position:relative;
  margin-bottom:8px;
}

.fill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#47ffe8,#e8ff47,#ff4747);
}

.threshold {
  position:absolute;
  top:0;
  width:2px;
  height:100%;
  background:red;
}

canvas { width:100%; height:80px; background:#111; }

.controls label {
  display:block;
  font-size:12px;
  margin-top:5px;
}

button { padding:10px; margin-top:10px; }

</style>
</head>

<body>

<h2>BPM Detector (quasi pro)</h2>

<div class="meter">
  <div class="fill" id="meter"></div>
  <div class="threshold" id="threshold"></div>
</div>

<div id="db">-∞ dB</div>

<canvas id="wave"></canvas>

<h1 id="bpm">--</h1>

<button onclick="toggle()">START / STOP</button>

<div class="controls">
  <label>Sensibilité <input type="range" id="sens" min="1.2" max="3" step="0.1" value="1.8"></label>
  <label>Lissage <input type="range" id="smooth" min="0.7" max="0.99" step="0.01" value="0.9"></label>
</div>

<script>

// ======================
// AUDIO
// ======================

let ctx, analyser, src, stream;
let running=false;

// ======================
// STATE
// ======================

let energyHistory=[];
let onsetHistory=[];
let beatTimes=[];

let lastBeat=0;

// ======================
// PARAMS
// ======================

let SENS=1.8;
let SMOOTH=0.9;

// ======================
// UI
// ======================

const meter = document.getElementById("meter");
const thresholdEl = document.getElementById("threshold");
const bpmEl = document.getElementById("bpm");
const dbEl = document.getElementById("db");

const canvas = document.getElementById("wave");
const cctx = canvas.getContext("2d");

sens.oninput = e=>SENS=+e.target.value;
smooth.oninput = e=>SMOOTH=+e.target.value;

// ======================
// START
// ======================

async function toggle(){

  if(running){
    stream.getTracks().forEach(t=>t.stop());
    ctx.close();
    running=false;
    return;
  }

  ctx = new AudioContext();

  stream = await navigator.mediaDevices.getUserMedia({
    audio:{
      echoCancellation:false,
      noiseSuppression:false,
      autoGainControl:false
    }
  });

  src = ctx.createMediaStreamSource(stream);

  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;

  src.connect(analyser);

  running=true;
  loop();
}

// ======================
// LOOP
// ======================

function loop(){
  if(!running) return;
  requestAnimationFrame(loop);

  const buffer = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buffer);

  // ======================
  // ENERGY (envelope follower)
  // ======================

  let sum=0;
  for(let i=0;i<buffer.length;i++){
    sum += buffer[i]*buffer[i];
  }

  let energy = Math.sqrt(sum / buffer.length);

  // smoothing
  if(energyHistory.length>0){
    energy = SMOOTH*energyHistory[energyHistory.length-1] + (1-SMOOTH)*energy;
  }

  energyHistory.push(energy);
  if(energyHistory.length>200) energyHistory.shift();

  // ======================
  // DB + VU
  // ======================

  let db = 20*Math.log10(energy);
  dbEl.textContent = isFinite(db)? db.toFixed(1)+" dB":"-∞";

  let norm = (db+60)/60;
  norm = Math.pow(norm,2);
  norm = Math.max(0,Math.min(1,norm));

  meter.style.width = (norm*100)+"%";

  // ======================
  // ONSET DETECTION
  // ======================

  let diff = 0;
  if(energyHistory.length>1){
    diff = energy - energyHistory[energyHistory.length-2];
  }

  onsetHistory.push(diff);
  if(onsetHistory.length>50) onsetHistory.shift();

  const mean = avg(onsetHistory);
  const std = stddev(onsetHistory, mean);

  const threshold = mean + SENS*std;

  // seuil visuel
  let thrNorm = (threshold*5);
  thrNorm = Math.max(0,Math.min(1,thrNorm));
  thresholdEl.style.left = (thrNorm*100)+"%";

  const now = performance.now();

  if(diff > threshold && now-lastBeat>250){
    lastBeat = now;

    meter.style.background="lime";
    setTimeout(()=>meter.style.background="",60);

    beatTimes.push(now);
    if(beatTimes.length>30) beatTimes.shift();

    computeBPM();
  }

  draw(buffer);
}

// ======================
// BPM via autocorrélation simplifiée
// ======================

function computeBPM(){

  if(beatTimes.length<8) return;

  let intervals=[];
  for(let i=1;i<beatTimes.length;i++){
    intervals.push(beatTimes[i]-beatTimes[i-1]);
  }

  const hist = {};

  intervals.forEach(i=>{
    const bpm = Math.round(60000/i);
    if(bpm<40 || bpm>220) return;
    hist[bpm] = (hist[bpm]||0)+1;
  });

  let bestBpm=null;
  let max=0;

  for(let b in hist){
    if(hist[b]>max){
      max=hist[b];
      bestBpm=b;
    }
  }

  if(bestBpm){
    bpmEl.textContent = bestBpm;
  }
}

// ======================
// DRAW
// ======================

function draw(buffer){

  const w = canvas.width = canvas.offsetWidth;
  const h = canvas.height = canvas.offsetHeight;

  cctx.clearRect(0,0,w,h);

  cctx.beginPath();

  for(let i=0;i<buffer.length;i++){
    const x = (i/buffer.length)*w;
    const y = (buffer[i]*0.5+0.5)*h;
    i===0?cctx.moveTo(x,y):cctx.lineTo(x,y);
  }

  cctx.strokeStyle="#47ffe8";
  cctx.stroke();
}

// ======================
// MATH
// ======================

function avg(a){ return a.reduce((x,y)=>x+y,0)/a.length; }
function stddev(a,m){
  return Math.sqrt(a.reduce((s,v)=>s+(v-m)*(v-m),0)/a.length);
}

</script>

</body>
</html>
