<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>BPM Detector</title>
<style>
  @import url('data:text/css,');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --accent: #e8ff47;
    --accent2: #47ffe8;
    --text: #f0f0f5;
    --muted: #5a5a72;
    --danger: #ff4747;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 2rem 1.5rem 3rem;
    min-height: 100dvh;
  }

  /* Header */
  header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse-dot 1s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* Main BPM display */
  .bpm-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    position: relative;
  }

  .bpm-ring {
    width: 220px; height: 220px;
    border-radius: 50%;
    border: 1.5px solid var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: border-color 0.3s;
  }
  .bpm-ring.listening {
    border-color: var(--accent);
    box-shadow: 0 0 0 0 rgba(232,255,71,0.4);
    animation: ring-breathe 1.5s ease-in-out infinite;
  }
  @keyframes ring-breathe {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,255,71,0.2); }
    50% { box-shadow: 0 0 0 18px rgba(232,255,71,0); }
  }
  .bpm-ring.beat {
    animation: ring-beat 0.12s ease-out !important;
  }
  @keyframes ring-beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  .bpm-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .bpm-value {
    font-size: 80px;
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -2px;
    transition: color 0.2s;
    font-variant-numeric: tabular-nums;
  }
  .bpm-value.no-signal { color: var(--muted); }
  .bpm-label {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* SVG beat ring */
  .ring-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: rotate(-90deg);
    pointer-events: none;
  }
  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 660;
    stroke-dashoffset: 660;
    transition: stroke-dashoffset 0.1s linear;
    opacity: 0.3;
  }

  /* Confidence bar */
  .confidence-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .conf-header {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .conf-bar-bg {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .conf-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease, background 0.4s;
  }

  /* Waveform */
  .waveform-wrap {
    width: 100%;
    position: relative;
  }
  canvas#waveform {
    width: 100%;
    height: 72px;
    display: block;
    border-radius: 8px;
  }

  /* Beat history dots */
  .beat-history {
    display: flex;
    gap: 6px;
    justify-content: center;
    align-items: center;
    height: 20px;
  }
  .beat-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--surface2);
    transition: background 0.1s, transform 0.1s;
  }
  .beat-dot.recent {
    background: var(--accent);
    transform: scale(1.4);
  }
  .beat-dot.old { background: var(--muted); }

  /* Stats row */
  .stats-row {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--surface2);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: -0.5px;
  }
  .stat-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Main button */
  .btn-start {
    width: 100%;
    padding: 18px;
    border: 1.5px solid var(--accent);
    border-radius: var(--radius);
    background: transparent;
    color: var(--accent);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.1s;
    -webkit-appearance: none;
  }
  .btn-start:active { transform: scale(0.98); }
  .btn-start.running {
    background: rgba(232,255,71,0.08);
    border-color: var(--danger);
    color: var(--danger);
  }
  .btn-reset {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .btn-reset:active { color: var(--text); }

  .bottom-row {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bottom-actions {
    display: flex;
    justify-content: center;
  }

  /* Tap tempo hint */
  .hint {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Level meter */
  .level-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .level-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .level-meter-bg {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .level-meter-fill {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent2) 0%, var(--accent) 60%, var(--danger) 100%);
    transition: width 0.05s linear;
  }
  .level-db {
    font-size: 10px;
    color: var(--muted);
    min-width: 36px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<header>
  <span class="logo">BPM Detector</span>
  <div class="status-dot" id="statusDot"></div>
</header>

<div class="bpm-container">
  <div class="bpm-ring" id="bpmRing">
    <svg class="ring-svg" viewBox="0 0 220 220">
      <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="105"/>
    </svg>
    <div class="bpm-inner">
      <div class="bpm-value no-signal" id="bpmValue">--</div>
      <div class="bpm-label">BPM</div>
    </div>
  </div>
</div>

<div class="beat-history" id="beatHistory">
  <!-- dots injected by JS -->
</div>

<div style="width:100%;display:flex;flex-direction:column;gap:10px;">
  <div class="confidence-wrap">
    <div class="conf-header">
      <span>Confiance</span>
      <span id="confValue">0%</span>
    </div>
    <div class="conf-bar-bg">
      <div class="conf-bar-fill" id="confBar"></div>
    </div>
  </div>

  <div class="level-row">
    <span class="level-label">Niveau</span>
    <div class="level-meter-bg">
      <div class="level-meter-fill" id="levelMeter"></div>
    </div>
    <span class="level-db" id="levelDb">-∞</span>
  </div>

  <div class="waveform-wrap">
    <canvas id="waveform"></canvas>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-value" id="statMin">--</div>
    <div class="stat-label">Min</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="statBeats">0</div>
    <div class="stat-label">Beats</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="statMax">--</div>
    <div class="stat-label">Max</div>
  </div>
</div>

<div class="bottom-row">
  <button class="btn-start" id="btnStart" onclick="toggleDetection()">
    ▶ &nbsp; Démarrer
  </button>
  <div class="bottom-actions">
    <button class="btn-reset" onclick="resetStats()">↺ &nbsp; Reset</button>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let audioCtx = null;
let analyser = null;
let compressor = null;
let stream = null;
let rafId = null;
let running = false;

const FFT_SIZE = 2048;
const SAMPLE_RATE_DEFAULT = 44100;
const FRAME_MS = 1000 / 30; // ~30fps

// Beat detection state
let prevLowBand = new Float32Array(FFT_SIZE / 2).fill(0);
let fluxHistory = [];
const FLUX_HISTORY_SIZE = 43; // ~1.4s window at 30fps
let beatTimestamps = [];
const BEAT_BUFFER_SIZE = 12;
let bpmSmoothed = null;
const BPM_ALPHA = 0.25; // smoothing factor
let beatCount = 0;
let bpmMin = Infinity;
let bpmMax = -Infinity;
let lastBeatTime = 0;
const MIN_BEAT_INTERVAL_MS = 250; // max 240 BPM
const BEAT_DOTS = 16;

// Waveform canvas
const wfCanvas = document.getElementById('waveform');
const wfCtx = wfCanvas.getContext('2d');

// ─── UI refs ──────────────────────────────────────────────────────────────────
const bpmValueEl = document.getElementById('bpmValue');
const bpmRingEl = document.getElementById('bpmRing');
const ringProgressEl = document.getElementById('ringProgress');
const statusDotEl = document.getElementById('statusDot');
const confBarEl = document.getElementById('confBar');
const confValueEl = document.getElementById('confValue');
const levelMeterEl = document.getElementById('levelMeter');
const levelDbEl = document.getElementById('levelDb');
const statMinEl = document.getElementById('statMin');
const statMaxEl = document.getElementById('statMax');
const statBeatsEl = document.getElementById('statBeats');
const beatHistoryEl = document.getElementById('beatHistory');
const btnStart = document.getElementById('btnStart');

// Init beat dots
for (let i = 0; i < BEAT_DOTS; i++) {
  const d = document.createElement('div');
  d.className = 'beat-dot';
  beatHistoryEl.appendChild(d);
}

// ─── Toggle ───────────────────────────────────────────────────────────────────
async function toggleDetection() {
  if (running) { stopDetection(); return; }
  try {
    await startDetection();
  } catch(e) {
    alert('Accès micro refusé ou non disponible.\n' + e.message);
  }
}

async function startDetection() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false,
      sampleRate: 44100
    }
  });

  const source = audioCtx.createMediaStreamSource(stream);

  // DynamicsCompressor for auto-level (guitar room → full band)
  compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -24;
  compressor.knee.value = 10;
  compressor.ratio.value = 6;
  compressor.attack.value = 0.003;
  compressor.release.value = 0.15;

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = FFT_SIZE;
  analyser.smoothingTimeConstant = 0.0; // no smoothing, we do it ourselves

  source.connect(compressor);
  compressor.connect(analyser);

  running = true;
  btnStart.textContent = '■  Arrêter';
  btnStart.classList.add('running');
  statusDotEl.classList.add('active');

  resetBeatState();
  loop();
}

function stopDetection() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  audioCtx = analyser = compressor = stream = null;

  btnStart.textContent = '▶  Démarrer';
  btnStart.classList.remove('running');
  statusDotEl.classList.remove('active');
  bpmRingEl.classList.remove('listening');
  levelMeterEl.style.width = '0%';
  levelDbEl.textContent = '-∞';
  clearWaveform();
}

// ─── Main loop ────────────────────────────────────────────────────────────────
let lastFrameTime = 0;
function loop(ts = 0) {
  if (!running) return;
  rafId = requestAnimationFrame(loop);
  if (ts - lastFrameTime < FRAME_MS) return;
  lastFrameTime = ts;

  const bufLen = analyser.frequencyBinCount; // FFT_SIZE/2 = 1024
  const freqData = new Float32Array(bufLen); // dBFS values
  analyser.getFloatFrequencyData(freqData);

  const sr = audioCtx.sampleRate || SAMPLE_RATE_DEFAULT;
  const binHz = sr / FFT_SIZE;

  // ── Level meter (full spectrum RMS in dBFS)
  let rmsSum = 0, rmsCount = 0;
  for (let i = 0; i < bufLen; i++) {
    const lin = Math.pow(10, freqData[i] / 20);
    rmsSum += lin * lin; rmsCount++;
  }
  const rmsDb = 10 * Math.log10(rmsSum / rmsCount);
  const levelPct = Math.max(0, Math.min(100, (rmsDb + 80) / 80 * 100));
  levelMeterEl.style.width = levelPct.toFixed(1) + '%';
  levelDbEl.textContent = isFinite(rmsDb) ? rmsDb.toFixed(0) + ' dB' : '-∞';

  // ── Waveform (time domain)
  const timeData = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(timeData);
  drawWaveform(timeData);

  // ── Low band spectral flux (60–180 Hz → kick zone)
  const binLow = Math.floor(60 / binHz);
  const binHigh = Math.floor(180 / binHz);

  let flux = 0;
  for (let i = binLow; i <= binHigh && i < bufLen; i++) {
    const cur = Math.pow(10, freqData[i] / 20);
    const prev = prevLowBand[i];
    const diff = cur - prev;
    if (diff > 0) flux += diff; // half-wave rectification
    prevLowBand[i] = cur;
  }

  fluxHistory.push(flux);
  if (fluxHistory.length > FLUX_HISTORY_SIZE) fluxHistory.shift();

  // ── Adaptive threshold
  const mean = fluxHistory.reduce((a, b) => a + b, 0) / fluxHistory.length;
  let variance = 0;
  for (const v of fluxHistory) variance += (v - mean) * (v - mean);
  const std = Math.sqrt(variance / fluxHistory.length);
  const threshold = mean + 1.5 * std;

  // ── Peak detection
  const now = performance.now();
  const isAbove = flux > threshold && flux > mean * 1.2;
  const timeSinceLast = now - lastBeatTime;

  if (isAbove && timeSinceLast > MIN_BEAT_INTERVAL_MS) {
    lastBeatTime = now;
    onBeat(now);
  }

  // ── Ring progress (visual metronome between beats)
  if (bpmSmoothed && beatTimestamps.length >= 2) {
    const interval = 60000 / bpmSmoothed;
    const phase = ((now - lastBeatTime) / interval) % 1;
    const circumference = 2 * Math.PI * 105;
    ringProgressEl.style.strokeDashoffset = (circumference * (1 - phase)).toFixed(1);
  }
}

// ─── Beat handler ─────────────────────────────────────────────────────────────
function onBeat(ts) {
  beatCount++;
  statBeatsEl.textContent = beatCount;

  beatTimestamps.push(ts);
  if (beatTimestamps.length > BEAT_BUFFER_SIZE) beatTimestamps.shift();

  if (beatTimestamps.length >= 4) {
    // Compute intervals
    const intervals = [];
    for (let i = 1; i < beatTimestamps.length; i++) {
      intervals.push(beatTimestamps[i] - beatTimestamps[i-1]);
    }

    // Filter out wildly off intervals (keep within 2x median)
    intervals.sort((a, b) => a - b);
    const medianIdx = Math.floor(intervals.length / 2);
    const median = intervals[medianIdx];
    const filtered = intervals.filter(v => v > median * 0.5 && v < median * 2);

    if (filtered.length < 2) return;

    // Average of filtered
    const avgInterval = filtered.reduce((a, b) => a + b, 0) / filtered.length;
    const rawBpm = 60000 / avgInterval;

    // Clamp to musical range 60–200 BPM
    if (rawBpm < 60 || rawBpm > 200) return;

    // Smooth
    if (bpmSmoothed === null) {
      bpmSmoothed = rawBpm;
    } else {
      bpmSmoothed = BPM_ALPHA * rawBpm + (1 - BPM_ALPHA) * bpmSmoothed;
    }

    const bpmDisplay = Math.round(bpmSmoothed);
    bpmValueEl.textContent = bpmDisplay;
    bpmValueEl.classList.remove('no-signal');
    bpmRingEl.classList.add('listening');

    // Confidence: based on how many intervals we have + consistency
    const consistency = 1 - (std_dev(filtered) / median);
    const sampleScore = Math.min(1, filtered.length / 6);
    const confidence = Math.round(Math.max(0, Math.min(1, consistency * sampleScore)) * 100);
    confBarEl.style.width = confidence + '%';
    confBarEl.style.background = confidence > 70 ? 'var(--accent)' : confidence > 40 ? '#ffaa00' : '#ff6644';
    confValueEl.textContent = confidence + '%';

    // Stats
    if (bpmDisplay < bpmMin) { bpmMin = bpmDisplay; statMinEl.textContent = bpmMin; }
    if (bpmDisplay > bpmMax) { bpmMax = bpmDisplay; statMaxEl.textContent = bpmMax; }
  }

  // Beat flash animation
  triggerBeatFlash();
  updateBeatDots();
}

function std_dev(arr) {
  const m = arr.reduce((a, b) => a + b, 0) / arr.length;
  return Math.sqrt(arr.reduce((s, v) => s + (v - m) ** 2, 0) / arr.length);
}

// ─── Visual feedback ──────────────────────────────────────────────────────────
function triggerBeatFlash() {
  bpmRingEl.classList.remove('beat');
  void bpmRingEl.offsetWidth; // reflow
  bpmRingEl.classList.add('beat');
  setTimeout(() => bpmRingEl.classList.remove('beat'), 150);
}

let beatDotsState = new Array(BEAT_DOTS).fill(0); // 0=empty, 1=recent, 2=old

function updateBeatDots() {
  // Shift left
  beatDotsState.shift();
  beatDotsState.push(2);
  // Make last one "recent"
  beatDotsState[beatDotsState.length - 1] = 1;

  // Fade recent to old after 300ms
  setTimeout(() => {
    if (beatDotsState[beatDotsState.length - 1] === 1) {
      beatDotsState[beatDotsState.length - 1] = 2;
      renderDots();
    }
  }, 300);

  renderDots();
}

function renderDots() {
  const dots = beatHistoryEl.children;
  for (let i = 0; i < BEAT_DOTS; i++) {
    const dot = dots[i];
    dot.className = 'beat-dot';
    if (beatDotsState[i] === 1) dot.classList.add('recent');
    else if (beatDotsState[i] === 2) dot.classList.add('old');
  }
}

// ─── Waveform ─────────────────────────────────────────────────────────────────
function drawWaveform(data) {
  const dpr = window.devicePixelRatio || 1;
  const w = wfCanvas.offsetWidth;
  const h = wfCanvas.offsetHeight;
  if (wfCanvas.width !== w * dpr || wfCanvas.height !== h * dpr) {
    wfCanvas.width = w * dpr;
    wfCanvas.height = h * dpr;
    wfCtx.scale(dpr, dpr);
  }
  wfCtx.clearRect(0, 0, w, h);

  // Background
  wfCtx.fillStyle = '#12121a';
  wfCtx.fillRect(0, 0, w, h);

  // Center line
  wfCtx.strokeStyle = '#1a1a26';
  wfCtx.lineWidth = 1;
  wfCtx.beginPath();
  wfCtx.moveTo(0, h / 2);
  wfCtx.lineTo(w, h / 2);
  wfCtx.stroke();

  // Waveform
  wfCtx.strokeStyle = '#47ffe8';
  wfCtx.lineWidth = 1.5;
  wfCtx.beginPath();
  const sliceW = w / data.length;
  for (let i = 0; i < data.length; i++) {
    const v = (data[i] / 128.0) - 1;
    const y = (v * h / 2) + h / 2;
    if (i === 0) wfCtx.moveTo(0, y);
    else wfCtx.lineTo(i * sliceW, y);
  }
  wfCtx.stroke();
}

function clearWaveform() {
  const w = wfCanvas.offsetWidth;
  const h = wfCanvas.offsetHeight;
  wfCtx.clearRect(0, 0, w, h);
  wfCtx.fillStyle = '#12121a';
  wfCtx.fillRect(0, 0, w, h);
}

// ─── Reset ────────────────────────────────────────────────────────────────────
function resetBeatState() {
  prevLowBand.fill(0);
  fluxHistory = [];
  beatTimestamps = [];
  bpmSmoothed = null;
  lastBeatTime = 0;
  beatDotsState.fill(0);
  renderDots();
  ringProgressEl.style.strokeDashoffset = '660';
}

function resetStats() {
  beatCount = 0;
  bpmMin = Infinity;
  bpmMax = -Infinity;
  statBeatsEl.textContent = '0';
  statMinEl.textContent = '--';
  statMaxEl.textContent = '--';
  bpmValueEl.textContent = '--';
  bpmValueEl.classList.add('no-signal');
  confBarEl.style.width = '0%';
  confValueEl.textContent = '0%';
  resetBeatState();
}

// Prevent sleep on mobile (where supported)
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
