<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPM Detector - Tempo Engine v2</title>

<style>
body { background:#0a0a0f; color:#fff; font-family:monospace; padding:20px; text-align:center; }

.meter { width:100%; height:12px; background:#222; }
.fill { height:100%; width:0%; background:linear-gradient(90deg,#47ffe8,#e8ff47,#ff4747); }

canvas { width:100%; height:80px; background:#111; margin-top:10px; }

#phase { width:200px; height:200px; margin:20px auto; }

.lock { color:#47ff8a; }
</style>
</head>

<body>

<h2>Tempo Engine v2 (autocorrélation)</h2>

<div class="meter"><div class="fill" id="meter"></div></div>
<div id="db">-∞ dB</div>

<canvas id="wave"></canvas>
<canvas id="phase"></canvas>

<h1 id="bpm">--</h1>
<div id="state">analyse…</div>

<button onclick="toggle()">START / STOP</button>

<script>

// ===== AUDIO =====
let ctx, analyser, src, stream, running=false;

// ===== BUFFER =====
const ENERGY_SIZE = 512;
let energyBuffer = new Array(ENERGY_SIZE).fill(0);

// ===== STATE =====
let smoothedBpm = null;
let beatInterval = null;
let phaseTime = 0;

// ===== UI =====
const meter = document.getElementById("meter");
const bpmEl = document.getElementById("bpm");
const stateEl = document.getElementById("state");
const dbEl = document.getElementById("db");

const waveCanvas = document.getElementById("wave");
const waveCtx = waveCanvas.getContext("2d");

const phaseCanvas = document.getElementById("phase");
const phaseCtx = phaseCanvas.getContext("2d");

// ===== START =====
async function toggle(){

  if(running){
    stream.getTracks().forEach(t=>t.stop());
    ctx.close();
    running=false;
    return;
  }

  ctx = new AudioContext();

  stream = await navigator.mediaDevices.getUserMedia({
    audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }
  });

  src = ctx.createMediaStreamSource(stream);
  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;

  src.connect(analyser);

  running = true;
  loop();
}

// ===== LOOP =====
function loop(){
  if(!running) return;
  requestAnimationFrame(loop);

  const buffer = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buffer);

  // ===== ENERGY =====
  let sum = 0;
  for(let i=0;i<buffer.length;i++) sum += buffer[i]*buffer[i];
  const energy = Math.sqrt(sum / buffer.length);

  energyBuffer.shift();
  energyBuffer.push(energy);

  // ===== DB + VU =====
  let db = 20*Math.log10(energy);
  dbEl.textContent = isFinite(db)? db.toFixed(1)+" dB":"-∞";

  let norm = (db+60)/60;
  norm = Math.pow(norm,2);
  norm = Math.max(0,Math.min(1,norm));
  meter.style.width = (norm*100)+"%";

  // ===== BPM via autocorrélation =====
  const bpm = detectBPM();

  if(bpm){
    if(smoothedBpm === null) smoothedBpm = bpm;
    else smoothedBpm = 0.9*smoothedBpm + 0.1*bpm;

    bpmEl.textContent = Math.round(smoothedBpm);

    beatInterval = 60000 / smoothedBpm;
    stateEl.textContent = "LOCKED";
    stateEl.className = "lock";
  }

  // ===== PHASE =====
  if(beatInterval){
    phaseTime += 16; // approx frame time
    const phase = (phaseTime % beatInterval) / beatInterval;
    drawPhase(phase);
  }

  drawWave(buffer);
}

// ===== AUTOCORR =====
function detectBPM(){

  const minLag = Math.floor(60 / 220 * 60); // ~220 BPM
  const maxLag = Math.floor(60 / 40 * 60);  // ~40 BPM

  let bestLag = 0;
  let bestCorr = 0;

  for(let lag = minLag; lag < maxLag; lag++){
    let corr = 0;

    for(let i=0;i<ENERGY_SIZE - lag;i++){
      corr += energyBuffer[i] * energyBuffer[i + lag];
    }

    if(corr > bestCorr){
      bestCorr = corr;
      bestLag = lag;
    }
  }

  if(bestLag === 0) return null;

  const secondsPerSample = 2048 / 44100;
  const period = bestLag * secondsPerSample;

  const bpm = 60 / period;

  if(bpm < 40 || bpm > 220) return null;

  return bpm;
}

// ===== DRAW =====
function drawWave(buffer){
  const w = waveCanvas.width = waveCanvas.offsetWidth;
  const h = waveCanvas.height = waveCanvas.offsetHeight;

  waveCtx.clearRect(0,0,w,h);
  waveCtx.beginPath();

  for(let i=0;i<buffer.length;i++){
    const x=(i/buffer.length)*w;
    const y=(buffer[i]*0.5+0.5)*h;
    i===0?waveCtx.moveTo(x,y):waveCtx.lineTo(x,y);
  }

  waveCtx.strokeStyle="#47ffe8";
  waveCtx.stroke();
}

function drawPhase(p){
  const w=phaseCanvas.width=200;
  const h=phaseCanvas.height=200;

  phaseCtx.clearRect(0,0,w,h);

  const cx=w/2, cy=h/2, r=80;

  phaseCtx.beginPath();
  phaseCtx.arc(cx,cy,r,0,Math.PI*2);
  phaseCtx.strokeStyle="#333";
  phaseCtx.stroke();

  phaseCtx.beginPath();
  phaseCtx.arc(cx,cy,r,-Math.PI/2,(-Math.PI/2)+(p*2*Math.PI));
  phaseCtx.strokeStyle="#47ffe8";
  phaseCtx.lineWidth=4;
  phaseCtx.stroke();
}

</script>

</body>
</html>
